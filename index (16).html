<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobros Materiales</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;--border2:#d0cec4;
  --text:#1a1917;--text2:#6b6860;--text3:#9b9890;
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-text:#3C3489;
  --green:#3B6D11;--green-light:#EAF3DE;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --radius:10px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.08)}
.login-school{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.login-logo-box{width:54px;height:54px;border-radius:12px;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;flex-shrink:0}
.login-logo-box img{width:100%;height:100%;object-fit:cover}
.login-school-name{font-size:16px;font-weight:600;line-height:1.3}
.login-school-sub{font-size:12px;color:var(--text3)}
.login-lbl{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.04em}
.login-in{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:14px;background:var(--surface2);color:var(--text);margin-bottom:14px;transition:border .15s}
.login-in:focus{outline:none;border-color:var(--purple);background:var(--surface)}
.login-btn{width:100%;padding:12px;background:var(--purple);color:white;border:none;border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer}
.login-btn:hover{opacity:.9}
.login-err{font-size:12px;color:var(--red);background:var(--red-light);padding:8px 12px;border-radius:7px;margin-top:10px;display:none}
.login-hint{font-size:11px;color:var(--text3);margin-top:14px;text-align:center;line-height:1.7}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
.topbar-logo{width:34px;height:34px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:18px}
.topbar-logo img{width:100%;height:100%;object-fit:cover}
.topbar-name{font-size:14px;font-weight:600;letter-spacing:-0.3px;white-space:nowrap}
.topbar-name span{color:var(--purple)}
.topbar-tabs{display:flex;gap:2px;margin-left:8px}
.tab-btn{padding:5px 10px;border-radius:7px;border:none;background:transparent;font-family:inherit;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn:hover{background:var(--surface2);color:var(--text)}
.tab-btn.active{background:var(--purple-light);color:var(--purple-text);font-weight:500}
.tab-btn.atab.active{background:var(--amber-light);color:#633806}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:7px}
.role-pill{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.rp-admin{background:var(--amber-light);color:#633806}
.rp-teacher{background:var(--purple-light);color:var(--purple-text)}
.save-pill{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);background:var(--surface2);border-radius:20px;padding:3px 9px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);transition:background .3s}
.sdot.saving{background:var(--amber)}.sdot.error{background:var(--red)}
.logout-btn{padding:5px 9px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-family:inherit;font-size:12px;cursor:pointer;color:var(--text2)}
.logout-btn:hover{background:var(--surface2)}
.school-corner{width:36px;height:36px;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.school-corner img{width:100%;height:100%;object-fit:cover}

/* LAYOUT */
.main{max-width:1000px;margin:0 auto;padding:14px 16px}
.conn-bar{background:var(--red-light);border-bottom:1px solid #F7C1C1;padding:5px 16px;font-size:12px;color:var(--red);text-align:center;display:none}
.conn-bar.offline{display:block}

/* COURSE BAR */
.course-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.course-bar label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.csel{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--surface2);color:var(--text);cursor:pointer;min-width:110px}
.csel:focus{outline:none;border-color:var(--purple)}
.cbadge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.cb-p{background:#E1F5EE;color:#085041}.cb-s{background:var(--purple-light);color:var(--purple-text)}.cb-n{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.divv{width:1px;height:20px;background:var(--border);flex-shrink:0}

/* STUDENT NAV */
.stu-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.stu-sw{position:relative;flex:1;max-width:260px}
.stu-sw select{width:100%;font-family:inherit;font-size:13px;font-weight:500;padding:8px 32px 8px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);appearance:none;cursor:pointer;box-shadow:var(--shadow)}
.stu-sw::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:11px}
.nav-a{width:32px;height:32px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:15px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s;box-shadow:var(--shadow)}
.nav-a:hover{border-color:var(--border2);color:var(--text)}
.nav-a:disabled{opacity:.35;cursor:default}
.pg-info{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}

/* STUDENT CARD */
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
.scard-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--purple-text);flex-shrink:0;border:2px solid var(--border)}
.stu-info{flex:1;min-width:0}
.stu-name{font-size:15px;font-weight:600;letter-spacing:-0.2px}
.stu-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--purple-light);color:var(--purple-text);font-weight:500;margin-left:6px;vertical-align:middle}
.stu-sub{font-size:11px;color:var(--text3);margin-top:1px}

/* KIT STATUS inline in header */
.kit-status{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.toggle-chip{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);transition:all .15s;user-select:none}
.toggle-chip:hover{background:var(--surface);border-color:var(--border2)}
.toggle-chip.on-armado{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.toggle-chip.on-entregado{background:var(--green-light);border-color:var(--green);color:var(--green)}
.chip-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:background .2s;flex-shrink:0}
.toggle-chip.on-armado .chip-dot{background:var(--blue)}
.toggle-chip.on-entregado .chip-dot{background:var(--green)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
.stat-cell{background:var(--surface);padding:10px 14px}
.stat-lbl{font-size:10px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}
.sv-ok{color:var(--green)}.sv-warn{color:var(--amber)}.sv-err{color:var(--red)}

/* PAYMENT SECTION */
.pay-section{border-top:1px solid var(--border)}
.pay-top{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.pay-col{background:var(--surface);padding:14px 16px}
.pay-col-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}

/* AUTO PAYMENT */
.auto-pay-wrap{display:flex;flex-direction:column;gap:8px}
.monto-row{display:flex;align-items:center;gap:8px}
.monto-lbl{font-size:13px;color:var(--text2);width:80px;flex-shrink:0}
.monto-in{flex:1;max-width:120px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Mono',monospace;font-size:15px;font-weight:500;background:var(--surface2);color:var(--text);text-align:right;transition:border .15s}
.monto-in:focus{outline:none;border-color:var(--purple);background:var(--surface)}
.method-row{display:flex;gap:6px;flex-wrap:wrap}
.meth-btn{flex:1;min-width:80px;padding:10px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;text-align:center;color:var(--text2)}
.meth-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.meth-btn.mb-qr{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.meth-btn.mb-efectivo{background:var(--green-light);border-color:var(--green);color:var(--green)}
.meth-btn.mb-parcial{background:var(--amber-light);border-color:var(--amber);color:var(--amber)}
.meth-hint{font-size:11px;color:var(--text3);margin-top:2px}

/* KIT COMPLETO button */
.kit-completo-btn{width:100%;padding:9px;background:var(--purple);color:white;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;margin-top:4px}
.kit-completo-btn:hover{opacity:.9}
.kit-total-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--border);margin-top:8px;font-size:13px}
.kit-total-lbl{color:var(--text2)}
.kit-total-val{font-family:'DM Mono',monospace;font-weight:600;font-size:15px}

/* PAY HISTORY */
.pay-hist{max-height:180px;overflow-y:auto}
.phi{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.phi:last-child{border-bottom:none}
.phi-monto{font-family:'DM Mono',monospace;font-weight:600;color:var(--green);min-width:56px}
.phi-m{padding:2px 6px;border-radius:10px;font-size:10px;font-weight:500}
.pm-qr{background:var(--blue-light);color:var(--blue)}
.pm-efectivo{background:var(--green-light);color:var(--green)}
.pm-parcial{background:var(--amber-light);color:var(--amber)}
.phi-date{color:var(--text3);font-size:10px;margin-left:auto;white-space:nowrap}
.phi-del{width:18px;height:18px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--red);font-size:12px;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
.phi-del:hover{background:var(--red-light)}
.no-pay{padding:16px;text-align:center;font-size:12px;color:var(--text3)}

/* SALDO BAR */
.saldo-bar{padding:9px 16px;background:var(--surface2);border-top:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.sb-item{display:flex;align-items:baseline;gap:4px}
.sb-lbl{font-size:11px;color:var(--text3)}
.sb-val{font-size:14px;font-weight:600;font-family:'DM Mono',monospace}

/* MATERIALS */
.mat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-top:1px solid var(--border)}
.mat-col{background:var(--surface)}
.mat-col-head{padding:7px 14px;font-size:10px;font-weight:500;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;justify-content:space-between}
.mat-item{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.mat-item:last-child{border-bottom:none}
.mat-item:hover{background:var(--surface2)}
.mat-item.checked{background:#f0fef4}
.mcheck{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.mat-item.checked .mcheck{background:var(--purple);border-color:var(--purple)}
.mcheck svg{display:none}
.mat-item.checked .mcheck svg{display:block}
.mat-text{flex:1}
.mat-name{font-size:12px;color:var(--text);line-height:1.3}
.mat-meta{font-size:10px;color:var(--text3)}

/* OBS */
.obs-bar{padding:10px 16px;border-top:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px}
.obs-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.obs-in{flex:1;border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:12px;font-family:inherit;background:var(--surface2);color:var(--text);resize:none}
.obs-in:focus{outline:none;border-color:var(--purple);background:var(--surface)}

/* BADGES */
.badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px}
.b-ok{background:var(--green-light);color:var(--green)}.b-warn{background:var(--amber-light);color:var(--amber)}.b-err{background:var(--red-light);color:var(--red)}.b-purple{background:var(--purple-light);color:var(--purple-text)}.b-neu{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.ss{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;box-shadow:var(--shadow)}
.ss .l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.ss .v{font-size:20px;font-weight:600;font-family:'DM Mono',monospace}
.filter-row{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.fsel{padding:6px 9px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:12px;background:var(--surface);color:var(--text)}
.export-btn{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);font-family:inherit;font-size:12px;cursor:pointer;color:var(--text);box-shadow:var(--shadow)}
.export-btn:hover{background:var(--surface2)}
.twrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--surface2);padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface2);cursor:pointer}

/* HISTORY */
.hi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;box-shadow:var(--shadow);margin-bottom:7px}
.hi-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:2px}
.hi-stu{font-size:13px;font-weight:500}
.hi-c{font-size:11px;color:var(--text3);margin-left:4px}
.hi-t{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap}
.hi-msg{font-size:12px;color:var(--text2)}

/* ADMIN */
.adm-title{font-size:14px;font-weight:600;margin-bottom:12px}
.adm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.adm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
.adm-head{padding:9px 13px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.adm-head-title{font-size:13px;font-weight:500}
.adm-list{max-height:200px;overflow-y:auto}
.adm-item{display:flex;align-items:center;gap:7px;padding:6px 11px;border-bottom:1px solid var(--border);font-size:12px}
.adm-item:last-child{border-bottom:none}
.adm-item-name{flex:1;line-height:1.3}
.adm-item-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap}
.adm-del{width:20px;height:20px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--red);font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
.adm-del:hover{background:var(--red-light)}
.adm-add{display:flex;gap:6px;padding:8px 11px;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap}
.adm-in{flex:1;min-width:70px;padding:6px 8px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:12px;background:var(--surface);color:var(--text)}
.adm-in:focus{outline:none;border-color:var(--purple)}
.adm-in.sm{width:56px;flex:none}
.add-btn{padding:6px 11px;background:var(--purple);color:white;border:none;border-radius:7px;font-family:inherit;font-size:12px;cursor:pointer;white-space:nowrap}
.add-btn:hover{opacity:.9}
.add-btn.g{background:var(--teal)}
/* import */
.imp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px}
.imp-body{padding:13px}
.imp-desc{font-size:12px;color:var(--text2);margin-bottom:9px;line-height:1.6}
.imp-ta{width:100%;min-height:90px;border:1px solid var(--border);border-radius:8px;padding:8px;font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);color:var(--text);resize:vertical;margin-bottom:7px}
.imp-ta:focus{outline:none;border-color:var(--purple);background:var(--surface)}
.imp-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.imp-sel{padding:6px 9px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:12px;background:var(--surface);color:var(--text)}
.imp-btn{padding:7px 14px;background:var(--teal);color:white;border:none;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer}
.imp-btn:hover{opacity:.9}
.imp-btn.red{background:var(--red)}
.imp-res{font-size:12px;padding:6px 9px;border-radius:6px;display:none;margin-top:6px}
.imp-res.ok{background:var(--green-light);color:var(--green);display:block}
.imp-res.err{background:var(--red-light);color:var(--red);display:block}
/* kit prices */
.kp-list{padding:9px 12px}
.kp-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.kp-item:last-child{border-bottom:none}
.kp-name{flex:1;color:var(--text2)}
.kp-in{width:78px;padding:4px 7px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;text-align:right;background:var(--surface2);color:var(--text)}
.kp-in:focus{outline:none;border-color:var(--purple)}
.save-kp{padding:7px 14px;background:var(--green);color:white;border:none;border-radius:var(--radius);font-family:inherit;font-size:12px;cursor:pointer}
.pass-sec{padding:12px}
.pass-row{display:flex;gap:8px;align-items:center;margin-bottom:9px}
.pass-lbl{font-size:12px;color:var(--text2);width:110px;flex-shrink:0}
.pass-in{flex:1;padding:6px 9px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;background:var(--surface2);color:var(--text)}
.pass-in:focus{outline:none;border-color:var(--purple)}
.save-pass{padding:7px 14px;background:var(--amber);color:white;border:none;border-radius:var(--radius);font-family:inherit;font-size:12px;cursor:pointer}
.adm-msg{font-size:12px;padding:5px 9px;border-radius:6px;margin-top:7px;display:none}
.adm-msg.ok{background:var(--green-light);color:var(--green);display:block}
.adm-msg.err{background:var(--red-light);color:var(--red);display:block}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo-prev{width:50px;height:50px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.logo-prev img{width:100%;height:100%;object-fit:cover}
.logo-upbtn{padding:7px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-family:inherit;font-size:12px;cursor:pointer;color:var(--text)}
.logo-upbtn:hover{background:var(--surface2)}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;transition:opacity .4s}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:var(--text3)}
.empty{padding:2rem;text-align:center;color:var(--text3);font-size:13px;line-height:1.8}
.filter-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-family:inherit;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s;display:flex;align-items:center;gap:4px}
.filter-chip:hover{background:var(--surface2);border-color:var(--border2)}
.fc-active{background:var(--purple-light);border-color:var(--purple);color:var(--purple-text);font-weight:500}
.fc-orange{background:var(--amber-light);border-color:var(--amber);color:var(--amber)}
@media(max-width:660px){.mat-grid,.pay-top,.adm-grid,.stats-row{grid-template-columns:1fr}.sum-grid{grid-template-columns:repeat(2,1fr)}.topbar-tabs{display:none}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>Cargando...</p></div>
<div class="conn-bar" id="conn-bar">Sin conexión</div>

<!-- LOGIN -->
<div id="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-school">
      <div class="login-logo-box" id="ll-box">🏫</div>
      <div><div class="login-school-name" id="ll-name">Colegio</div><div class="login-school-sub">Sistema de cobros de materiales</div></div>
    </div>
    <label class="login-lbl">Contraseña</label>
    <input class="login-in" type="password" id="lpass" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-err" id="lerr">Contraseña incorrecta</div>
    <div class="login-hint">Contraseña de profesor → acceso normal<br>Contraseña de admin → administración completa</div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" style="display:none">
  <div class="topbar">
    <div class="topbar-logo" id="tl">🏫</div>
    <div class="topbar-name" id="tn">Cobros <span>Materiales</span></div>
    <div class="topbar-tabs" id="ttabs"></div>
    <div class="topbar-right">
      <div class="role-pill" id="rpill"></div>
      <div class="save-pill"><div class="sdot" id="sdot"></div><span id="stxt">...</span></div>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
      <div class="school-corner" id="sc">🏫</div>
    </div>
  </div>
  <div class="main">
    <div id="vs"></div>
    <div id="vr" style="display:none"></div>
    <div id="vh" style="display:none"></div>
    <div id="vv" style="display:none"></div>
    <div id="va" style="display:none"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';
import { getStorage } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

const FB = {
  apiKey:"AIzaSyC84vZxxhnDcTWmjD-6Ytz5p0BfK6yLFcg",
  authDomain:"ventas-2026-66b26.firebaseapp.com",
  databaseURL:"https://ventas-2026-66b26-default-rtdb.firebaseio.com",
  projectId:"ventas-2026-66b26",
  storageBucket:"ventas-2026-66b26.firebasestorage.app",
  messagingSenderId:"695334960314",
  appId:"1:695334960314:web:4d43a637223aed1610d683"
};

// ── COURSES ──
const PRIM = ['1ro Azul','1ro Rojo','2do Azul','2do Rojo','3ro Azul','3ro Rojo','4to Azul','4to Rojo','5to Azul','5to Rojo','6to Azul','6to Rojo'];
const SECU = ['1ro Azul','1ro Rojo','1ro Blanco','2do Azul','2do Rojo','2do Blanco','3ro Azul','3ro Rojo','3ro Blanco','4to Azul','4to Rojo','4to Blanco','5to QB','5to FM','6to QB','6to FM'];
const ALL_C = [...PRIM.map(c=>({n:'Primaria',c})),...SECU.map(c=>({n:'Secundaria',c}))];

// Grade key — 5to QB, 5to FM, 6to QB, 6to FM get their OWN key; others use just the grade number
const gradeKey = curso => {
  const sp = curso.split(' ');
  // If has a suffix like QB/FM/Rojo/Azul/Blanco after the grade, use full name for 5to/6to with QB/FM
  const g = sp[0]; const suf = sp[1]||'';
  if((g==='5to'||g==='6to')&&(suf==='QB'||suf==='FM')) return g+'_'+suf;
  return g;
};

const fk = s => String(s).replace(/[.#$[\]\s\/]/g,'_');
const ck = (n,c) => fk(n+'_'+c);
const now = () => new Date().toLocaleString('es-BO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
const initials = n => n.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();

// ── STATE ──
let PASS_T='profe2025', PASS_A='admin2025';
let db, cfg={}, studentsDB={}, cobrosDB={}, matsDB={}, kitPDB={};
let role=null, nivel='Primaria', curso=PRIM[0], idx=0, tab='student', saveT=null;
let savedFilter={fn:'Todos',fc:'Todos',fe:'Todos'};
let lastToggleTime=0;
let stuFilter='todos'; // 'todos' | 'porarmar'
let adminState={impNivel:'Primaria',impCurso:'',impMg:'1ro'};
let lastAdmAction=0;
let lastPayTime=0;
let schoolQR='';
let schoolLogo='', schoolName='Colegio';

// ── SESSION PERSISTENCE ──
function saveSession(r){ try{localStorage.setItem('cobros_role',r);}catch(e){} }
function loadSession(){ try{return localStorage.getItem('cobros_role');}catch(e){return null;} }
function clearSession(){ try{localStorage.removeItem('cobros_role');}catch(e){} }

// ── HELPERS ──
const getStudents = () => studentsDB[ck(nivel,curso)]||[];
const getMats = (g) => matsDB[g||gradeKey(curso)]||[];
const getKitP = (g) => kitPDB[g||gradeKey(curso)]||0;
const defStu = () => {
  const c={};
  getMats().forEach(m=>c[m.id]=false);
  return {components:c,payments:[],armado:false,entregado:false,observacion:''};
};
function getStuData(nombre){
  const k=ck(nivel,curso);
  if(!cobrosDB[k]) cobrosDB[k]={};
  if(!cobrosDB[k][fk(nombre)]) cobrosDB[k][fk(nombre)]=defStu();
  const d=cobrosDB[k][fk(nombre)];
  if(!d.payments) d.payments=[];
  if(!d.components) d.components={};
  getMats().forEach(m=>{if(d.components[m.id]===undefined) d.components[m.id]=false;});
  return d;
}
const totalPag = d => (d.payments||[]).reduce((s,p)=>s+(parseFloat(p.monto)||0),0);
const selMatsTotal = d => { let t=0; getMats().forEach(m=>{if(d.components?.[m.id]) t+=m.price*m.qty;}); return t; };
const getSaldo = d => selMatsTotal(d)-totalPag(d);
const matsDone = d => getMats().filter(m=>d.components?.[m.id]).length;

// ── SAVE STATUS ──
function setSS(s){
  const dot=document.getElementById('sdot'),txt=document.getElementById('stxt');
  if(!dot||!txt)return;
  dot.className='sdot'+(s==='saving'?' saving':s==='error'?' error':'');
  txt.textContent=s==='saved'?'Guardado':s==='saving'?'Guardando...':'Error';
}
async function saveStu(nombre){
  if(!db)return; setSS('saving');
  try{await set(ref(db,'cobros/'+ck(nivel,curso)+'/'+fk(nombre)),cobrosDB[ck(nivel,curso)][fk(nombre)]); setSS('saved');}
  catch(e){setSS('saved'); console.warn('saveStu:',e);}
}
const schedSave = n => {setSS('saving');clearTimeout(saveT);saveT=setTimeout(()=>saveStu(n),700);};
const saveCfg = async() => {try{await set(ref(db,'config'),cfg);}catch(e){}};
const saveMats = async() => {try{await set(ref(db,'materials'),matsDB);}catch(e){}};
const saveKPs = async() => {try{await set(ref(db,'kitPrices'),kitPDB);}catch(e){}};
const saveStus = async() => {try{await set(ref(db,'students'),studentsDB);}catch(e){}};

// ── LOGIN / SESSION ──
function updateBranding(){
  ['ll-box','tl','sc'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.innerHTML=schoolLogo?`<img src="${schoolLogo}" alt="">`:'🏫';
  });
  const nm=document.getElementById('ll-name'); if(nm) nm.textContent=schoolName;
  const tn=document.getElementById('tn'); if(tn) tn.innerHTML=`${schoolName} <span>Materiales</span>`;
}

function showLogin(){
  document.getElementById('loading').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
  updateBranding();
}

function showApp(r){
  role=r; saveSession(r);
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('loading').style.display='none';
  const rp=document.getElementById('rpill');
  rp.textContent=r==='admin'?'⚙ Admin':'Profesor';
  rp.className='role-pill '+(r==='admin'?'rp-admin':'rp-teacher');
  updateBranding(); buildTabs(); setTab('summary');
}

window.doLogout=()=>{role=null;clearSession();document.getElementById('lpass').value='';showLogin();};

document.getElementById('lpass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
window.doLogin=function(){
  const p=document.getElementById('lpass').value.trim();
  const err=document.getElementById('lerr');
  err.style.display='none';
  if(p===PASS_A) showApp('admin');
  else if(p===PASS_T) showApp('teacher');
  else{err.style.display='block';document.getElementById('lpass').value='';}
};

function buildTabs(){
  const tabs=[{id:'summary',l:'Resumen'},{id:'student',l:'Detalle'},{id:'history',l:'Historial'}];
  if(role==='admin') tabs.push({id:'ventas',l:'📊 Ventas',cls:''});
  if(role==='admin') tabs.push({id:'admin',l:'⚙ Admin',cls:'atab'});
  document.getElementById('ttabs').innerHTML=tabs.map(t=>`<button class="tab-btn ${t.cls||''}" data-tab="${t.id}" onclick="setTab('${t.id}')">${t.l}</button>`).join('');
}

window.setTab=function(t){
  tab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  [['vs','student'],['vr','summary'],['vh','history'],['vv','ventas'],['va','admin']].forEach(([id,name])=>{
    const el=document.getElementById(id); if(el) el.style.display=name===t?'':'none';
  });
  if(t==='student') renderStu();
  if(t==='summary') renderSum();
  if(t==='history') renderHist();
  if(t==='ventas') renderVentas();
  if(t==='admin') renderAdm();
};
window.goStudent=(n,c,i)=>{nivel=n;curso=c;idx=i;setTab('student');};

// ── COURSE BAR ──
function buildCourseBar(){
  const nivelOpts=['Primaria','Secundaria'].map(n=>`<option value="${n}" ${n===nivel?'selected':''}>${n}</option>`).join('');
  const cursos=nivel==='Primaria'?PRIM:SECU;
  const cursoOpts=cursos.map(c=>`<option value="${c}" ${c===curso?'selected':''}>${c}</option>`).join('');
  const stus=getStudents();
  const kitP=getKitP();
  const cobrado=stus.reduce((s,n)=>s+totalPag(getStuData(n)),0);
  const totalSel=stus.reduce((s,n)=>{
    const d=getStuData(n), mts=getMats();
    return s+mts.reduce((t,m)=>d.components?.[m.id]?t+m.price*m.qty:t,0);
  },0);
  const pend=Math.max(0,totalSel-cobrado);
  return`<div class="course-bar">
    <label>Nivel</label>
    <select class="csel" id="csel-n">${nivelOpts}</select>
    <label>Curso</label>
    <select class="csel" id="csel-c">${cursoOpts}</select>
    <div class="divv"></div>
    <span class="cbadge ${nivel==='Primaria'?'cb-p':'cb-s'}">${nivel}</span>
    <span class="cbadge cb-n">${curso} · ${stus.length} est.</span>
    ${role==='admin'?`<span class="cbadge cb-n" style="margin-left:auto">Kit Bs.${kitP} · Cobrado <span style="color:var(--green)">Bs.${cobrado.toFixed(1)}</span> · Pendiente <span style="color:${pend>0?'var(--amber)':'var(--green)'}">Bs.${pend.toFixed(1)}</span></span>`:''}
  </div>`;
}
function attachCB(){
  document.getElementById('csel-n')?.addEventListener('change',e=>{nivel=e.target.value;curso=(nivel==='Primaria'?PRIM:SECU)[0];idx=0;renderStu();});
  document.getElementById('csel-c')?.addEventListener('change',e=>{curso=e.target.value;idx=0;renderStu();});
}

// ── STUDENT VIEW ──
function buildFilterBar(){
  if(role!=='admin') return '';
  const stusAll=getStudents(), mats=getMats();
  const porArmarCount=stusAll.filter(n=>{
    const d=getStuData(n);
    const sel=mats.reduce((s,m)=>d.components?.[m.id]?s+m.price*m.qty:s,0);
    return sel>0 && totalPag(d)>=sel && !d.armado;
  }).length;
  return `<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap">
    <button class="filter-chip ${stuFilter==='todos'?'fc-active':''}" onclick="setStuFilter('todos')">Todos</button>
    <button class="filter-chip ${stuFilter==='porarmar'?'fc-active fc-orange':''}" onclick="setStuFilter('porarmar')">
      🔧 Por armar <span style="background:${porArmarCount>0?'#E24B4A':'#639922'};color:white;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px">${porArmarCount}</span>
    </button>
    ${stuFilter==='porarmar'?'<span style="font-size:11px;color:var(--text3)">Solo estudiantes que pagaron y su kit no está armado</span>':''}
  </div>`;
}
function attachFilterBar(){
  document.querySelectorAll('.filter-chip').forEach(b=>{
    b.addEventListener('click',()=>{});
  });
}
window.setStuFilter=function(f){ stuFilter=f; idx=0; renderStu(); };
function renderStu(){
  let stus=getStudents(); const mats=getMats(), kitP=getKitP();
  // Apply "Por armar" filter: pagados completamente y no armados
  if(stuFilter==='porarmar'){
    stus=stus.filter(n=>{
      const d=getStuData(n);
      const sel=mats.reduce((s,m)=>d.components?.[m.id]?s+m.price*m.qty:s,0);
      const pag=totalPag(d);
      return sel>0 && pag>=sel && !d.armado;
    });
  }
  if(!stus.length){
    const msg=stuFilter==='porarmar'
      ?'<div class="empty">🎉 <strong>¡Todo armado!</strong><br>No quedan kits pendientes de armar en este curso.</div>'
      :`<div class="empty">No hay estudiantes en <strong>${curso}</strong>.<br>Importa estudiantes desde el panel Admin.</div>`;
    document.getElementById('vs').innerHTML=buildCourseBar()+buildFilterBar()+msg;
    attachCB(); attachFilterBar(); return;
  }
  if(idx>=stus.length) idx=0;
  const nombre=stus[idx];
  const d=getStuData(nombre);
  const pag=totalPag(d), saldo=getSaldo(d), selTotal=selMatsTotal(d);
  const done=matsDone(d);
  const saldoBadge = done===0
    ? '<span class="badge b-neu">No registrado</span>'
    : saldo<=0
      ? '<span class="badge b-ok">Pagado</span>'
      : pag>0
        ? ('<span class="badge b-warn">Debe Bs.'+saldo.toFixed(1)+'</span>')
        : '<span class="badge b-err">Sin pago</span>';
  const half=Math.ceil(mats.length/2);
  const lm=mats.slice(0,half), rm=mats.slice(half);
  const mr=m=>{const ck2=d.components?.[m.id];return`<div class="mat-item ${ck2?'checked':''}" data-cid="${m.id}"><div class="mcheck"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="mat-text"><div class="mat-name">${m.name}</div><div class="mat-meta">x${m.qty} · Bs.${m.price} = Bs.${(m.price*m.qty).toFixed(1)}</div></div></div>`;};
  const payRows=(d.payments||[]).slice().reverse().map((p,ri)=>{
    const oi=d.payments.length-1-ri;
    return`<div class="phi"><span class="phi-monto">Bs.${parseFloat(p.monto).toFixed(1)}</span><span class="phi-m pm-${p.metodo}">${p.metodo}</span><span style="flex:1;font-size:10px;color:var(--text3)">${p.fecha}</span><button class="phi-del" onclick="delPay('${nombre}',${oi})">×</button></div>`;
  }).join('')||`<div class="no-pay">Sin pagos aún</div>`;

  document.getElementById('vs').innerHTML=`
    ${buildCourseBar()}
    ${buildFilterBar()}
    <div class="stu-nav">
      <button class="nav-a" id="pb" ${idx===0?'disabled':''}>←</button>
      <div class="stu-sw"><select id="ssel">${stus.map((s,i)=>`<option value="${i}" ${i===idx?'selected':''}>${s}</option>`).join('')}</select></div>
      <button class="nav-a" id="nb" ${idx===stus.length-1?'disabled':''}>→</button>
      <span class="pg-info">${idx+1}/${stus.length}${stuFilter==='porarmar'?' por armar':''}</span>
      ${saldoBadge}
    </div>

    <div class="scard">
      <div class="scard-head">
        <div class="avatar">${initials(nombre)}</div>
        <div class="stu-info">
          <div class="stu-name">${nombre}<span class="stu-tag">${curso}</span></div>
          <div class="stu-sub">${done}/${mats.length} materiales seleccionados · Total seleccionado: <strong>Bs.${selTotal.toFixed(1)}</strong></div>
        </div>
        <div class="kit-status">
          <div class="toggle-chip ${d.armado?'on-armado':''}" id="tc-armado" ${role==='admin'?'style="cursor:pointer"':'style="cursor:default;opacity:.85"'} title="${role==='admin'?'Click para cambiar':'Solo admin puede cambiar'}">
            <div class="chip-dot"></div>Kit armado${role==='admin'?'':' <span style=\'font-size:9px;opacity:.6\'>(admin)</span>'}
          </div>
          <div class="toggle-chip ${d.entregado?'on-entregado':''}" id="tc-entregado">
            <div class="chip-dot"></div>Kit entregado
          </div>
        </div>
      </div>

      <div class="stats-row" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-cell"><div class="stat-lbl">A cobrar (sel.)</div><div class="stat-val">Bs.${selTotal.toFixed(1)}</div><div style="font-size:10px;color:var(--text3);margin-top:2px">Kit completo: Bs.${kitP}</div></div>
        <div class="stat-cell"><div class="stat-lbl">Pagado</div><div class="stat-val sv-ok">Bs.${pag.toFixed(1)}</div></div>
        <div class="stat-cell"><div class="stat-lbl">Saldo</div><div class="stat-val ${saldo<=0?'sv-ok':saldo>0?'sv-warn':'sv-err'}">Bs.${saldo.toFixed(1)}</div></div>
      </div>

      <!-- 50/50: cobros izquierda | materiales derecha -->
      <div style="display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.6fr);border-top:1px solid var(--border)">

        <!-- IZQUIERDA: Cobros compactos -->
        <div style="background:var(--surface);padding:12px 14px;display:flex;flex-direction:column;gap:9px;border-right:1px solid var(--border)">
          <div style="font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.04em">Registrar pago</div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:12px;color:var(--text2);flex-shrink:0;width:26px">Bs.</span>
            <input class="monto-in" id="pmonto" type="number" min="0" step="0.5" placeholder="0.00" autocomplete="off" style="flex:1;font-size:17px;padding:7px 10px;font-family:'DM Mono',monospace;font-weight:600">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
            <button class="meth-btn" id="mbqr" onclick="regPay('${nombre}','qr')" style="padding:10px 6px;font-size:13px;font-weight:500">📱 QR</button>
            <button class="meth-btn" id="mbef" onclick="regPay('${nombre}','efectivo')" style="padding:10px 6px;font-size:13px;font-weight:500">💵 Efectivo</button>
          </div>
          <button class="kit-completo-btn" id="kc-btn" onclick="kitCompleto('${nombre}')" style="font-size:12px;padding:8px">✓ KIT COMPLETO — Bs.${mats.reduce((s,m)=>s+m.price*m.qty,0).toFixed(0)}</button>

window.regPay = (nombre, metodo, montoOverride) => {
  const el=document.getElementById('pmonto');
  const monto=montoOverride||parseFloat(el?.value);
  if(!monto||monto<=0){ el?.focus(); if(!montoOverride){el?.classList.add('error-flash');setTimeout(()=>el?.classList.remove('error-flash'),600);} return; }
  const d=getStuData(nombre);
  if(!d.payments) d.payments=[];
  d.payments.push({monto,metodo,fecha:now()});
  if(el&&!montoOverride) el.value='';
  lastPayTime=Date.now();
  schedSave(nombre); renderStu();
};

window.delPay = (nombre, i) => {
  if(!confirm('¿Eliminar este pago?')) return;
  const d=getStuData(nombre);
  d.payments.splice(i,1);
  schedSave(nombre); renderStu();
};

window.pagoRapidoQR = (nombre, montoKit) => {
  // Mark all materials + register full kit payment in one click
  const d=getStuData(nombre);
  const mats=getMats();
  // Mark all materials
  mats.forEach(m=>d.components[m.id]=true);
  // Register payment for full kit amount
  if(!d.payments) d.payments=[];
  const total=mats.reduce((s,m)=>s+m.price*m.qty,0);
  d.payments.push({monto:total,metodo:'qr',fecha:now()});
  lastPayTime=Date.now();
  schedSave(nombre); renderStu();
};
window.kitCompleto = (nombre) => {
  const d=getStuData(nombre);
  const mats=getMats();
  const allChecked=mats.every(m=>d.components?.[m.id]);
  mats.forEach(m=>d.components[m.id]=!allChecked);
  schedSave(nombre); renderStu();
};

function attachStuEvts(nombre){
  document.getElementById('ssel')?.addEventListener('change',e=>{idx=parseInt(e.target.value);renderStu();});
  document.getElementById('pb')?.addEventListener('click',()=>{if(idx>0){idx--;renderStu();}});
  document.getElementById('nb')?.addEventListener('click',()=>{
    const filteredLen=document.getElementById('ssel')?.options.length||getStudents().length;
    if(idx<filteredLen-1){idx++;renderStu();}
  });
  document.getElementById('pmonto')?.addEventListener('keydown',e=>{if(e.key==='Enter'){window.regPay(nombre,'efectivo');}});

  document.querySelectorAll('.mat-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const cid=item.dataset.cid;
      const d=getStuData(nombre);
      if(!d.components) d.components={};
      d.components[cid]=!d.components[cid];
      schedSave(nombre); renderStu();
    });
  });

  document.getElementById('tc-armado')?.addEventListener('click',()=>{
    if(role!=='admin') return;
    const d=getStuData(nombre); d.armado=!d.armado;
    schedSave(nombre); renderStu();
  });
  document.getElementById('tc-entregado')?.addEventListener('click',()=>{
    const d=getStuData(nombre); d.entregado=!d.entregado;
    schedSave(nombre); renderStu();
  });

  let ot;
  document.getElementById('obsin')?.addEventListener('input',e=>{
    const d=getStuData(nombre); d.observacion=e.target.value;
    clearTimeout(ot); ot=setTimeout(()=>schedSave(nombre),1000);
  });
}

  ALL_C.forEach(({n,c})=>{

      tCob+=pag; tPend+=(sal>0?sal:0); tEst++;

    const pagadoCell = isAdm
      ? `<td style="font-family:'DM Mono',monospace">Bs.${r.pag.toFixed(1)}</td><td><span class="badge ${pb}">${pt}</span></td>`
      : `<td colspan="2"><span class="badge ${pb}">${pt}</span></td>`;

  const adminStatCards = isAdm ? `
      <div class="ss"><div class="l">Cobrado</div><div class="v sv-ok">Bs.${tCob.toFixed(1)}</div></div>
      <div class="ss"><div class="l">Pendiente</div><div class="v ${tPend>0?'sv-err':'sv-ok'}">Bs.${tPend.toFixed(1)}</div></div>` : '';

      ${adminStatCards}

      <div class="ss"><div class="l">Entregados</div><div class="v">${entregados}/${tEst}</div></div>
    </div>
    <div class="filter-row">
      <select class="fsel" id="fn" onchange="updateSumCursoFilter()">${['Todos','Primaria','Secundaria'].map(x=>`<option ${x===savedFilter.fn?'selected':''}>${x}</option>`).join('')}</select>
      <select class="fsel" id="fc" onchange="filterSum()">${(()=>{
        const nivel=savedFilter.fn||'Todos';
        const opts=nivel==='Primaria'?['Todos',...PRIM]:nivel==='Secundaria'?['Todos',...SECU]:['Todos',...PRIM,...SECU];

      fc.innerHTML=opts.map(x=>'<option>'+x+'</option>').join('');
    }
    if(fc&&savedFilter.fc) fc.value=savedFilter.fc;
    if(fe&&savedFilter.fe) fe.value=savedFilter.fe;
    filterSum();
  },0);
}

window.toggleEntSum=(n,c,nombre,e)=>{
  e.stopPropagation();
  const k=ck(n,c);
  if(!cobrosDB[k]) cobrosDB[k]={};
  if(!cobrosDB[k][fk(nombre)]) cobrosDB[k][fk(nombre)]={payments:[],components:{},armado:false,entregado:false,observacion:''};
  cobrosDB[k][fk(nombre)].entregado=!cobrosDB[k][fk(nombre)].entregado;
  const newVal=cobrosDB[k][fk(nombre)].entregado;
  lastToggleTime=Date.now();
  // Update cell in-place (no flicker, keeps filters)
  const row=document.querySelector('[data-rowkey="'+n+'_'+c+'_'+nombre+'"]');
  if(row){
    const cell=row.querySelector('.ent-cell');
    if(cell){
      const span=document.createElement('span');
      span.style.cssText=newVal?'':'color:var(--text3);font-size:11px;cursor:pointer';
      span.className=newVal?'badge b-ok':'';
      if(newVal) span.style.cursor='pointer';
      span.textContent=newVal?'✓ Entregado':'— marcar';
      span.onclick=ev=>toggleEntSum(n,c,nombre,ev);
      cell.innerHTML='';
      cell.appendChild(span);
    }
  }
  // Save in background
  set(ref(db,'cobros/'+k+'/'+fk(nombre)+'/entregado'),newVal).then(()=>setSS('saved')).catch(er=>console.warn('entregado:',er));
};
window.updateSumCursoFilter=function(){
  const fn=document.getElementById('fn')?.value||'Todos';
  savedFilter.fn=fn;
  const fc=document.getElementById('fc');
  if(!fc) return;
  const opts=fn==='Primaria'?['Todos',...PRIM]:fn==='Secundaria'?['Todos',...SECU]:['Todos',...PRIM,...SECU];
  fc.innerHTML=opts.map(x=>'<option>'+x+'</option>').join('');
  savedFilter.fc='Todos';
  filterSum();
};
window.filterSum=()=>{
  const fn=document.getElementById('fn')?.value||'Todos';
  const fc=document.getElementById('fc')?.value||'Todos';
  const fe=document.getElementById('fe')?.value||'Todos';
  savedFilter={fn,fc,fe};
  document.querySelectorAll('#stbody tr').forEach(row=>{
    const rn=row.dataset.n||'', rc=row.dataset.c||'';
    const bt=row.querySelector('.badge')?.textContent||'';
    const ok=(fn==='Todos'||rn===fn)&&(fc==='Todos'||rc===fc)&&
      (fe==='Todos'||
      (fe==='pagado'&&bt==='Pagado')||
      (fe==='parcial'&&bt.startsWith('Bs.'))||
      (fe==='sinpago'&&bt==='Sin pago')||
      (fe==='pendiente'&&bt==='No registrado'));
    row.style.display=ok?'':'none';
  });
};

// ── VENTAS ──
function renderVentas(){
  // Aggregate all sold materials across all courses
  const matSales = {}; // key: grade+matId => {name, qty, price, unitsSold, courseSold}
  let totalRevenue = 0, totalUnitsSold = 0;

  ALL_C.forEach(({n,c})=>{
    const k=ck(n,c), g=gradeKey(c);
    const stus=studentsDB[k]||[];
    const mats=matsDB[g]||[];
    stus.forEach(nombre=>{
      const d=(cobrosDB[k]||{})[fk(nombre)];
      if(!d) return;
      // Only count if student paid >= total selected (fully paid)
      const stuSelTotal = mats.reduce((s,m)=>d.components?.[m.id]?s+m.price*m.qty:s, 0);
      const stuPaid = (d.payments||[]).reduce((s,p)=>s+(parseFloat(p.monto)||0),0);
      if(stuSelTotal<=0 || stuPaid < stuSelTotal) return;
      mats.forEach(m=>{
        if(!d.components?.[m.id]) return;
        const key=g+'_'+m.id;
        if(!matSales[key]) matSales[key]={name:m.name,price:m.price,qty:m.qty,grade:g,unitsSold:0,revenue:0,courses:new Set()};
        matSales[key].unitsSold += m.qty;
        matSales[key].revenue += m.price*m.qty;
        matSales[key].courses.add(c);
        totalRevenue += m.price*m.qty;
        totalUnitsSold += m.qty;
      });
    });
  });

  const salesArr = Object.values(matSales).sort((a,b)=>b.revenue-a.revenue);
  const uniqueMats = salesArr.length;
  const totalStudentsWithAny = (() => {
    const seen = new Set();
    ALL_C.forEach(({n,c})=>{
      const k=ck(n,c), g=gradeKey(c), stus=studentsDB[k]||[];
      stus.forEach(nombre=>{
        const d=(cobrosDB[k]||{})[fk(nombre)];
        if(d && Object.values(d.components||{}).some(v=>v)) seen.add(k+nombre);
      });
    });
    return seen.size;
  })();

  // Bar chart data (top 15 by revenue)

  const matRows = salesArr.map((m,i)=>{
    const pct = Math.round(m.revenue/totalRevenue*100)||0;

      <td style="font-family:'DM Mono',monospace;text-align:right">Bs.${m.price}</td>

        </div>
        <div style="font-size:9px;color:var(--text3);margin-top:1px">${pct}%</div>
      </td>
    </tr>`;
  }).join('');

      <text x="${x+barW2/2}" y="${svgH-14}" text-anchor="middle" font-size="8" fill="#9b9890">${short.substring(0,12)}</text>`;
  }).join('');

  document.getElementById('vv').innerHTML=`

        <thead><tr><th>Material</th><th>Grado</th><th>Precio unit.</th><th>Unidades vendidas</th><th>Ingreso total</th><th>Proporción</th></tr></thead>
        <tbody>${matRows||'<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:2rem">Sin datos de ventas todavía</td></tr>'}</tbody>
        ${salesArr.length?'<tfoot><tr style="background:var(--surface2)"><td colspan="3" style="font-weight:600;font-size:12px;padding:8px 10px">TOTAL</td><td style="font-family:DM Mono,monospace;font-weight:600;text-align:right;padding:8px 10px">'+totalUnitsSold+'</td><td style="font-family:DM Mono,monospace;font-weight:600;text-align:right;color:var(--green);padding:8px 10px">Bs.'+totalRevenue.toFixed(0)+'</td><td></td></tr></tfoot>':''}
      </table>
    </div>`;
}

window.expVentasCSV=()=>{
  const matSales={};
  ALL_C.forEach(({n,c})=>{
    const k=ck(n,c),g=gradeKey(c),stus=studentsDB[k]||[],mats=matsDB[g]||[];
    stus.forEach(nombre=>{
      const d=(cobrosDB[k]||{})[fk(nombre)];
      if(!d)return;
      mats.forEach(m=>{
        if(!d.components?.[m.id])return;
        const key=g+'_'+m.id;
        if(!matSales[key])matSales[key]={name:m.name,price:m.price,qty:m.qty,grade:g,unitsSold:0,revenue:0};
        matSales[key].unitsSold+=m.qty;
        matSales[key].revenue+=m.price*m.qty;
      });
    });
  });
  let csv='Material,Grado,Precio Unitario,Unidades Vendidas,Ingreso Total\n';
  Object.values(matSales).sort((a,b)=>b.revenue-a.revenue).forEach(m=>{
    csv+='"'+m.name+'","'+m.grade+'",'+m.price+','+m.unitsSold+','+m.revenue.toFixed(0)+'\n';
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='ventas_materiales.csv';a.click();
};

window.resetAll=async()=>{
  if(!confirm('¿Seguro? Esto borrará TODOS los pagos y materiales de TODOS los estudiantes. No se puede deshacer.')) return;
  if(!confirm('Segunda confirmación: ¿Realmente quieres borrar todo?')) return;
  try{
    await set(ref(db,'cobros'),null);
    cobrosDB={};
    alert('Datos reseteados correctamente.');
    renderVentas();
  }catch(e){alert('Error al resetear: '+e.message);}
};

// ── ADMIN ──
function showAdmResult(msg, type){
  const el=document.getElementById('imp-res');
  if(el){el.textContent=msg;el.className='imp-res '+type;setTimeout(()=>el.className='imp-res',5000);}
  refreshStuOverview();
}
function refreshStuOverview(){
  const overview=document.getElementById('adm-stu-overview');
  if(!overview) return;
  overview.innerHTML=ALL_C.map(({n,c})=>{
    const k=ck(n,c), list=studentsDB[k]||[];
    const isSelected=(adminState.impNivel===n&&(adminState.impCurso===c||adminState.impCurso===''));
    const stuRows=isSelected&&list.length?list.map((s,i)=>
      '<div class="adm-item" style="padding:4px 10px 4px 20px;border-bottom:0.5px solid var(--border)">'+
      '<div class="adm-item-name" style="font-size:11px">'+s+'</div>'+
      '<button class="adm-del" data-k="'+k+'" data-i="'+i+'" data-name="'+s.replace(/"/g,'&quot;')+'" onclick="delOneStuBtn(this)" title="Eliminar">×</button>'+
      '</div>'
    ).join(''):'';
    return'<div class="adm-item" style="cursor:pointer" data-tn="'+n+'" data-tc="'+c+'" onclick="toggleStuListBtn(this)">'+
      '<div class="adm-item-name"><strong>'+c+'</strong> <span style="color:var(--text3);font-size:10px">'+n+'</span></div>'+
      '<div class="adm-item-meta">'+list.length+' est. '+(isSelected&&list.length?'▲':'▶')+'</div></div>'+stuRows;
  }).join('');
}
window.toggleStuList=function(n,c){
  if(adminState.impNivel===n&&adminState.impCurso===c){
    adminState.impCurso=''; // collapse
  } else {
    adminState.impNivel=n; adminState.impCurso=c;
  }
  refreshStuOverview();
  // Also sync the import selectors
  const ni=document.getElementById('imp-n'), ci=document.getElementById('imp-c');
  if(ni) ni.value=adminState.impNivel;
  if(ci){
    const opts=adminState.impNivel==='Primaria'?PRIM:SECU;
    ci.innerHTML=opts.map(x=>'<option>'+x+'</option>').join('');
    if(adminState.impCurso) ci.value=adminState.impCurso;
  }
};
window.delOneStuBtn=function(btn){
  const k=btn.dataset.k, i=parseInt(btn.dataset.i);
  window.delOneStu(k,i);
};
window.toggleStuListBtn=function(el){
  const n=el.dataset.tn, c=el.dataset.tc;
  window.toggleStuList(n,c);
};
window.delOneStu=async(k,i)=>{
  const list=studentsDB[k]||[];
  const name=list[i];
  if(!name||!confirm('¿Eliminar a '+name+'? Sus datos de pago se conservan.'))return;
  list.splice(i,1);
  studentsDB[k]=list;
  lastAdmAction=Date.now();
  await saveStus();
  showAdmResult('Eliminado: '+name,'ok');
};
function renderAdm(){

  const matCards=grades.map(g=>{
    const mats=matsDB[g]||[];
    const rows=mats.map((m,i)=>`<div class="adm-item"><div class="adm-item-name">${m.name}</div><div class="adm-item-meta">x${m.qty}·Bs.${m.price}</div><button class="adm-del" onclick="delMat('${g}',${i})">×</button></div>`).join('')||'<div style="padding:8px;font-size:11px;color:var(--text3)">Sin materiales</div>';
    return`<div class="adm-card" style="margin-bottom:10px">
      <div class="adm-head"><div class="adm-head-title">📦 ${gradeLabels[g]} (${mats.length})</div></div>
      <div class="adm-list">${rows}</div>
      <div class="adm-add">
        <input class="adm-in" id="mn-${g}" placeholder="Nombre material">
        <input class="adm-in sm" id="mq-${g}" type="number" placeholder="×" min="1" value="1">
        <input class="adm-in sm" id="mp-${g}" type="number" placeholder="Bs." step="0.1">
        <button class="add-btn" onclick="addMat('${g}')">+</button>
      </div>
    </div>`;
  }).join('');

  const kpRows=grades.map(g=>`<div class="kp-item"><span class="kp-name">${gradeLabels[g]}</span><input class="kp-in" id="kp-${g}" type="number" value="${kitPDB[g]||0}" min="0" step="0.5"></div>`).join('');

  // Build students list with per-student delete, grouped by curso
  // Show expanded list for selected nivel/curso
  const stuOverview=ALL_C.map(({n,c})=>{
    const k=ck(n,c), list=studentsDB[k]||[];
    const isSelected=(adminState.impNivel===n&&(adminState.impCurso===c||adminState.impCurso===''));
    const stuRows=isSelected&&list.length?list.map((s,i)=>{
      return'<div class="adm-item" style="padding:4px 10px 4px 20px;border-bottom:0.5px solid var(--border)">'+
        '<div class="adm-item-name" style="font-size:11px">'+s+'</div>'+
        '<button class="adm-del" data-k="'+k+'" data-i="'+i+'" data-name="'+s.replace(/"/g,'&quot;')+'" onclick="delOneStuBtn(this)" title="Eliminar">×</button>'+
        '</div>';
    }).join(''):'';
    return`<div class="adm-item" style="cursor:pointer" onclick="toggleStuList('${n}','${c}')">
      <div class="adm-item-name"><strong>${c}</strong> <span style="color:var(--text3);font-size:10px">${n}</span></div>
      <div class="adm-item-meta">${list.length} est. ${isSelected&&list.length?'▲':'▶'}</div>
    </div>${stuRows}`;
  }).join('');

  document.getElementById('va').innerHTML=`
    <div class="adm-title">Panel de administración</div>

    <!-- IMPORT STUDENTS -->
    <div class="imp-card" style="margin-bottom:12px">
      <div class="adm-head"><div class="adm-head-title">📥 Importar estudiantes desde Excel / Sheets</div></div>
      <div class="imp-body">
        <div class="imp-desc">Copia la columna de nombres desde Excel o Google Sheets (un nombre por fila) y pégala aquí. Selecciona el nivel y curso destino.</div>
        <textarea class="imp-ta" id="imp-names" placeholder="Juan Pérez&#10;María García&#10;Carlos López&#10;..."></textarea>
        <div class="imp-row">
          <select class="imp-sel" id="imp-n">${['Primaria','Secundaria'].map(x=>'<option '+(x===adminState.impNivel?'selected':'')+'>'+x+'</option>').join('')}</select>
          <select class="imp-sel" id="imp-c">${(adminState.impNivel==='Secundaria'?SECU:PRIM).map(x=>'<option '+(x===adminState.impCurso?'selected':'')+'>'+x+'</option>').join('')}</select>
          <button class="imp-btn" onclick="importStus()">⬆ Importar</button>
          <button class="imp-btn red" onclick="clearCurso()">🗑 Limpiar lista</button>
        </div>
        <div class="imp-res" id="imp-res"></div>
      </div>
    </div>

    <!-- IMPORT MATERIALS -->
    <div class="imp-card" style="margin-bottom:12px">
      <div class="adm-head"><div class="adm-head-title">📥 Importar materiales desde Excel / Sheets</div></div>
      <div class="imp-body">
        <div class="imp-desc">Pega 3 columnas: <strong>Nombre | Cantidad | Precio</strong> (separadas por Tab desde Excel, una fila por material). Selecciona el grado destino.</div>
        <textarea class="imp-ta" id="imp-mats" placeholder="Arduino UNO R3	1	75&#10;Protoboard 400 puntos	1	17&#10;Diodo LED Rojo 5MM	2	0.5"></textarea>
        <div class="imp-row">
          <select class="imp-sel" id="imp-mg">${grades.map(g=>`<option value="${g}">${gradeLabels[g]}</option>`).join('')}</select>
          <button class="imp-btn" onclick="importMats()">⬆ Importar materiales</button>
          <button class="imp-btn red" onclick="clearMats()">🗑 Limpiar grado</button>
        </div>
        <div class="imp-res" id="imp-mres"></div>
      </div>
    </div>

    <div class="adm-grid" style="margin-bottom:12px">
      <div class="adm-card">
        <div class="adm-head"><div class="adm-head-title">Resumen de cursos</div></div>
        <div class="adm-list" style="max-height:340px" id="adm-stu-overview">${stuOverview}</div>
      </div>
      <div class="adm-card">
        <div class="adm-head"><div class="adm-head-title">Precio del kit por grado</div></div>
        <div class="kp-list">${kpRows}</div>
        <div style="padding:9px 12px;border-top:1px solid var(--border)">
          <button class="save-kp" onclick="saveAllKP()">Guardar precios</button>
          <div class="adm-msg" id="kp-msg"></div>
        </div>
      </div>
    </div>

    <div style="font-size:13px;font-weight:500;margin-bottom:9px">Materiales por grado</div>

    <div class="adm-grid">
      <div class="adm-card">
        <div class="adm-head"><div class="adm-head-title">Contraseñas</div></div>
        <div class="pass-sec">
          <div class="pass-row"><span class="pass-lbl">Profesores</span><input class="pass-in" id="npt" type="password" placeholder="Nueva contraseña"></div>
          <div class="pass-row"><span class="pass-lbl">Admin</span><input class="pass-in" id="npa" type="password" placeholder="Nueva contraseña"></div>
          <button class="save-pass" onclick="savePasses()">Guardar</button>
          <div class="adm-msg" id="pass-msg"></div>
        </div>
      </div>
      <div class="adm-card">
        <div class="adm-head"><div class="adm-head-title">Nombre y logo del colegio</div></div>
        <div class="pass-sec">
          <div class="pass-row"><span class="pass-lbl">Nombre</span><input class="pass-in" id="sn-in" type="text" value="${schoolName}" placeholder="Nombre del colegio"></div>
          <div class="logo-row">
            <div class="logo-prev" id="lp">${schoolLogo?`<img src="${schoolLogo}">`:'🏫'}</div>
            <input type="file" id="lf" accept="image/*" style="display:none">
            <button class="logo-upbtn" onclick="document.getElementById('lf').click()">Cambiar logo</button>
          </div>
          <div style="font-size:12px;color:var(--text3);margin-bottom:6px;margin-top:4px">QR de pago (aparece en la vista de cobro)</div>
          <div class="logo-row">
            <div class="logo-prev" id="qrp" style="border-radius:8px">${schoolQR?`<img src="${schoolQR}">`:'QR'}</div>
            <input type="file" id="qrf" accept="image/*" style="display:none">
            <button class="logo-upbtn" onclick="document.getElementById('qrf').click()">Subir QR</button>
            ${schoolQR?'<button class="logo-upbtn" style="color:var(--red)" onclick="schoolQR=\'\';document.getElementById(\'qrp\').innerHTML=\'QR\'">Quitar</button>':''}
          </div>
          <button class="save-pass" onclick="saveSchool()">Guardar</button>
          <div class="adm-msg" id="school-msg"></div>
        </div>
      </div>
    </div>`;

  // Sync nivel→curso for student import
  document.getElementById('imp-n')?.addEventListener('change',e=>{
    adminState.impNivel=e.target.value;
    adminState.impCurso='';
    const c=e.target.value==='Primaria'?PRIM:SECU;
    document.getElementById('imp-c').innerHTML=c.map(x=>'<option>'+x+'</option>').join('');
  });
  document.getElementById('imp-c')?.addEventListener('change',e=>{ adminState.impCurso=e.target.value; });
  // Enter for material inputs
  grades.forEach(g=>document.getElementById('mp-'+g)?.addEventListener('keydown',e=>{if(e.key==='Enter')addMat(g);}));
  // Logo file
  document.getElementById('lf')?.addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file)return;
    if(file.size>600*1024){alert('El logo debe ser menor a 600KB');return;}
    const r=new FileReader(); r.onload=ev=>{schoolLogo=ev.target.result;document.getElementById('lp').innerHTML=`<img src="${schoolLogo}">`;};
    r.readAsDataURL(file);
  });
  document.getElementById('qrf')?.addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file)return;
    if(file.size>800*1024){alert('El QR debe ser menor a 800KB');return;}
    const r2=new FileReader(); r2.onload=ev=>{schoolQR=ev.target.result;const qp=document.getElementById('qrp');if(qp)qp.innerHTML=`<img src="${schoolQR}" style="width:100%;height:100%;object-fit:contain">`;};
    r2.readAsDataURL(file);
  });
}

function showMsg(id,msg,t){const el=document.getElementById(id);if(!el)return;el.textContent=msg;el.className='adm-msg '+t;setTimeout(()=>el.className='adm-msg',3000);}
function showImpRes(id,msg,t){const el=document.getElementById(id);if(!el)return;el.textContent=msg;el.className='imp-res '+t;setTimeout(()=>el.className='imp-res',5000);}

window.importStus=async()=>{
  const raw=document.getElementById('imp-names')?.value||'';
  const n=document.getElementById('imp-n')?.value;
  const c=document.getElementById('imp-c')?.value;
  const names=raw.split('\n').map(x=>x.trim()).filter(x=>x.length>1);
  if(!names.length){showImpRes('imp-res','No se encontraron nombres','err');return;}
  adminState.impNivel=n; adminState.impCurso=c;
  const k=ck(n,c); if(!studentsDB[k]) studentsDB[k]=[];
  let added=0;
  names.forEach(name=>{if(!studentsDB[k].includes(name)){studentsDB[k].push(name);added++;}});
  lastAdmAction=Date.now();
  await saveStus();
  document.getElementById('imp-names').value='';
  showAdmResult('✓ '+added+' estudiantes importados a '+c+'. Total: '+studentsDB[k].length,'ok');
};

window.clearCurso=async()=>{
  const n=document.getElementById('imp-n')?.value;
  const c=document.getElementById('imp-c')?.value;
  if(!confirm('¿Limpiar la lista de '+c+'? Los pagos no se borran.'))return;
  adminState.impNivel=n; adminState.impCurso=c;
  studentsDB[ck(n,c)]=[];
  lastAdmAction=Date.now();
  await saveStus();
  showAdmResult('Lista de '+c+' limpiada','ok');
};

window.importMats=async()=>{
  const raw=document.getElementById('imp-mats')?.value||'';
  const g=document.getElementById('imp-mg')?.value;
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);
  if(!lines.length){showImpRes('imp-mres','No hay datos','err');return;}
  if(!matsDB[g]) matsDB[g]=[];
  let added=0;
  lines.forEach(line=>{
    const parts=line.split('\t');
    if(parts.length<2)return;
    const name=parts[0].trim(); const qty=parseInt(parts[1])||1; const price=parseFloat(parts[2])||0;
    if(!name)return;
    matsDB[g].push({id:Date.now()+Math.random(),name,qty,price});
    added++;
  });
  await saveMats();
  document.getElementById('imp-mats').value='';
  showImpRes('imp-mres',`✓ ${added} materiales importados a ${g}`,'ok');
  renderAdm();
};

window.clearMats=async()=>{
  const g=document.getElementById('imp-mg')?.value;
  if(!confirm(`¿Eliminar todos los materiales de ${g}?`))return;
  matsDB[g]=[];
  await saveMats(); showImpRes('imp-mres',`Materiales de ${g} eliminados`,'ok'); renderAdm();
};

window.addMat=async g=>{
  const name=document.getElementById('mn-'+g)?.value.trim();
  const qty=parseInt(document.getElementById('mq-'+g)?.value)||1;
  const price=parseFloat(document.getElementById('mp-'+g)?.value)||0;
  if(!name)return;
  if(!matsDB[g]) matsDB[g]=[];
  matsDB[g].push({id:Date.now(),name,qty,price});
  await saveMats();
  ['mn-','mq-','mp-'].forEach(p=>{const el=document.getElementById(p+g);if(el)el.value=p==='mq-'?'1':'';});
  renderAdm();
};
window.delMat=async(g,i)=>{
  if(!confirm(`¿Eliminar "${matsDB[g][i]?.name}"?`))return;
  matsDB[g].splice(i,1); await saveMats(); renderAdm();
};

window.saveAllKP=async()=>{
  ['1ro','2do','3ro','4to','5to','6to','5to_QB','5to_FM','6to_QB','6to_FM'].forEach(g=>{
    const v=parseFloat(document.getElementById('kp-'+g)?.value)||0;
    kitPDB[g]=v;
  });
  await saveKPs(); showMsg('kp-msg','Precios guardados','ok');
};

window.savePasses=async()=>{
  const pt=document.getElementById('npt')?.value.trim();
  const pa=document.getElementById('npa')?.value.trim();
  if(!pt&&!pa){showMsg('pass-msg','Escribe al menos una','err');return;}
  if(pt){PASS_T=pt;cfg.passTeacher=pt;}
  if(pa){PASS_A=pa;cfg.passAdmin=pa;}
  await saveCfg();
  document.getElementById('npt').value=''; document.getElementById('npa').value='';
  showMsg('pass-msg','Guardadas','ok');
};

window.saveSchool=async()=>{
  schoolName=document.getElementById('sn-in')?.value.trim()||'Colegio';
  cfg.schoolName=schoolName; cfg.schoolLogo=schoolLogo; cfg.schoolQR=schoolQR;
  await saveCfg(); updateBranding(); showMsg('school-msg','Guardado','ok');
};

window.expCSV=()=>{
  let csv='Estudiante,Nivel,Curso,Pagado,Saldo,Materiales,Armado,Entregado\n';
  ALL_C.forEach(({n,c})=>{
    const k=ck(n,c), g=gradeKey(c), kp=kitPDB[g]||0, stus=studentsDB[k]||[], mats=matsDB[g]||[];
    stus.forEach(nombre=>{
      const d=(cobrosDB[k]||{})[fk(nombre)];
      const pag=d?totalPag(d):0, dn=d?mats.filter(m=>d.components?.[m.id]).length:0;
      csv+=`"${nombre}","${n}","${c}",${pag.toFixed(0)},${(kp-pag).toFixed(0)},${dn}/${mats.length},${d?.armado?'Si':'No'},${d?.entregado?'Si':'No'}\n`;
    });
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='cobros_colegio.csv'; a.click();
};

// ── FIREBASE ──
try{
  const fbApp=initializeApp(FB);
  db=getDatabase(fbApp);
  try{ storage=getStorage(fbApp); }catch(e){ console.warn('Storage not available'); }

  let loaded={cfg:false,stu:false,cob:false,mat:false,kp:false};
  function tryShow(){
    if(!Object.values(loaded).every(Boolean))return;
    document.getElementById('loading').style.opacity='0';
    setTimeout(()=>{
      document.getElementById('loading').style.display='none';
      // Restore session
      const savedRole=loadSession();
      if(savedRole==='admin'||savedRole==='teacher') showApp(savedRole);
      else showLogin();
    },400);
    setSS('saved');
  }

  onValue(ref(db,'config'),s=>{
    cfg=s.val()||{};
    if(cfg.passTeacher) PASS_T=cfg.passTeacher;
    if(cfg.passAdmin) PASS_A=cfg.passAdmin;
    if(cfg.schoolName) schoolName=cfg.schoolName;
    if(cfg.schoolLogo) schoolLogo=cfg.schoolLogo;
    if(cfg.schoolQR) schoolQR=cfg.schoolQR;
    if(!cfg.passTeacher){cfg.passTeacher=PASS_T;cfg.passAdmin=PASS_A;saveCfg();}
    loaded.cfg=true; tryShow();
    if(role) updateBranding();
  });

  onValue(ref(db,'students'),s=>{
    studentsDB=s.val()||{}; loaded.stu=true; tryShow();
    if(role&&tab==='student') renderStu();
    if(role&&tab==='summary') renderSum();
    // Only re-render admin if not triggered by our own save (avoid losing state)
    if(role&&tab==='admin'&&Date.now()-lastAdmAction>1500) renderAdm();
  });

  onValue(ref(db,'cobros'),s=>{
    cobrosDB=s.val()||{}; loaded.cob=true; tryShow();
    const now2=Date.now();
    if(now2-lastToggleTime<2000) return; // debounce after toggle
    if(now2-lastPayTime<1500) return;    // debounce after payment
    if(role&&tab==='student') renderStu();
    if(role&&tab==='summary'&&now2-lastToggleTime>100) renderSum();
    if(role&&tab==='history') renderHist();
  });

  onValue(ref(db,'materials'),s=>{matsDB=s.val()||{};loaded.mat=true;tryShow();});
  onValue(ref(db,'kitPrices'),s=>{kitPDB=s.val()||{};loaded.kp=true;tryShow();});

  window.addEventListener('online',()=>document.getElementById('conn-bar').classList.remove('offline'));
  window.addEventListener('offline',()=>document.getElementById('conn-bar').classList.add('offline'));
}catch(e){
  document.getElementById('loading').style.display='none'; showLogin();
}
</script>
