<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;--border2:#d0cec4;
  --text:#1a1917;--text2:#6b6860;--text3:#9b9890;
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-text:#3C3489;
  --green:#3B6D11;--green-light:#EAF3DE;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --orange:#C05E0A;--orange-light:#FEF0E4;
  --radius:10px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.08)}
.login-school{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.login-logo-box{width:54px;height:54px;border-radius:12px;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;flex-shrink:0}
.login-logo-box img{width:100%;height:100%;object-fit:cover}
.login-school-name{font-size:16px;font-weight:600;line-height:1.3}
.login-school-sub{font-size:12px;color:var(--text3)}
.login-lbl{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.04em}
.login-in{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:14px;background:var(--surface2);color:var(--text);margin-bottom:14px;transition:border .15s}
.login-in:focus{outline:none;border-color:var(--purple);background:var(--surface)}
.login-btn{width:100%;padding:12px;background:var(--purple);color:white;border:none;border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer}
.login-btn:hover{opacity:.9}
.login-err{font-size:12px;color:var(--red);background:var(--red-light);padding:8px 12px;border-radius:7px;margin-top:10px;display:none}
.login-hint{font-size:11px;color:var(--text3);margin-top:14px;text-align:center;line-height:1.7}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
.topbar-logo{width:34px;height:34px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:18px}
.topbar-logo img{width:100%;height:100%;object-fit:cover}
.topbar-name{font-size:14px;font-weight:600;letter-spacing:-0.3px;white-space:nowrap}
.topbar-name span{color:var(--purple)}
.topbar-tabs{display:flex;gap:2px;margin-left:8px}
.tab-btn{padding:5px 10px;border-radius:7px;border:none;background:transparent;font-family:inherit;font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn:hover{background:var(--surface2);color:var(--text)}
.tab-btn.active{background:var(--purple-light);color:var(--purple-text);font-weight:500}
.tab-btn.atab.active{background:var(--amber-light);color:#633806}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:7px}
.role-pill{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.rp-admin{background:var(--amber-light);color:#633806}
.rp-teacher{background:var(--purple-light);color:var(--purple-text)}
.save-pill{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);background:var(--surface2);border-radius:20px;padding:3px 9px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);transition:background .3s}
.sdot.saving{background:var(--amber)}.sdot.error{background:var(--red)}
.logout-btn{padding:5px 9px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-family:inherit;font-size:12px;cursor:pointer;color:var(--text2)}
.logout-btn:hover{background:var(--surface2)}
.school-corner{width:36px;height:36px;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.school-corner img{width:100%;height:100%;object-fit:cover}

/* SECTION NAV BAR (admin only) */
.sec-nav{background:var(--surface);border-bottom:2px solid var(--border);display:flex;gap:0;overflow-x:auto;position:sticky;top:54px;z-index:90}
.sec-btn{padding:10px 18px;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.sec-btn:hover{color:var(--text);background:var(--surface2)}
.sec-btn.active{color:var(--purple);border-bottom-color:var(--purple)}
.sec-btn.s-menor.active{color:var(--teal);border-bottom-color:var(--teal)}
.sec-btn.s-mayor.active{color:var(--orange);border-bottom-color:var(--orange)}
.sec-btn.s-inv.active{color:var(--blue);border-bottom-color:var(--blue)}
.sec-btn.s-resgen.active{color:var(--amber);border-bottom-color:var(--amber)}

/* LAYOUT */
.main{max-width:1060px;margin:0 auto;padding:14px 16px}
.conn-bar{background:var(--red-light);border-bottom:1px solid #F7C1C1;padding:5px 16px;font-size:12px;color:var(--red);text-align:center;display:none}
.conn-bar.offline{display:block}

/* COURSE BAR */
.course-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.course-bar label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.csel{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--surface2);color:var(--text);cursor:pointer;min-width:110px}
.csel:focus{outline:none;border-color:var(--purple)}
.cbadge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.cb-p{background:#E1F5EE;color:#085041}.cb-s{background:var(--purple-light);color:var(--purple-text)}.cb-n{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.divv{width:1px;height:20px;background:var(--border);flex-shrink:0}

/* STUDENT NAV */
.stu-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.stu-sw{position:relative;flex:1;max-width:260px}
.stu-sw select{width:100%;font-family:inherit;font-size:13px;font-weight:500;padding:8px 32px 8px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);appearance:none;cursor:pointer;box-shadow:var(--shadow)}
.stu-sw::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:11px}
.nav-a{width:32px;height:32px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:15px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s;box-shadow:var(--shadow)}
.nav-a:hover{border-color:var(--border2);color:var(--text)}
.nav-a:disabled{opacity:.35;cursor:default}
.pg-info{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}

/* STUDENT CARD */
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
.scard-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--purple-text);flex-shrink:0;border:2px solid var(--border)}
.stu-info{flex:1;min-width:0}
.stu-name{font-size:15px;font-weight:600;letter-spacing:-0.2px}
.stu-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--purple-light);color:var(--purple-text);font-weight:500;margin-left:6px;vertical-align:middle}
.stu-sub{font-size:11px;color:var(--text3);margin-top:1px}
.kit-status{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.toggle-chip{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);transition:all .15s;user-select:none}
.toggle-chip:hover{background:var(--surface);border-color:var(--border2)}
.toggle-chip.on-armado{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.toggle-chip.on-entregado{background:var(--green-light);border-color:var(--green);color:var(--green)}
.chip-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:background .2s;flex-shrink:0}
.toggle-chip.on-armado .chip-dot{background:var(--blue)}
.toggle-chip.on-entregado .chip-dot{background:var(--green)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
.stat-cell{background:var(--surface);padding:10px 14px}
.stat-lbl{font-size:10px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:18px;font-weight:600;font-family:'DM Mono',monospace}
.sv-ok{color:var(--green)}.sv-warn{color:var(--amber)}.sv-err{color:var(--red)}

/* PAYMENT */
.monto-in{flex:1;max-width:120px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Mono',monospace;font-size:15px;font-weight:500;background:var(--surface2);color:var(--text);text-align:right;transition:border .15s}
.monto-in:focus{outline:none;border-color:var(--purple);background:var(--surface)}
.meth-btn{flex:1;min-width:80px;padding:10px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;text-align:center;color:var(--text2)}
.meth-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.meth-btn.mb-qr{background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.meth-btn.mb-efectivo{background:var(--green-light);border-color:var(--green);color:var(--green)}
.kit-completo-btn{width:100%;padding:9px;background:var(--purple);color:white;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;margin-top:4px}
.kit-completo-btn:hover{opacity:.9}

/* PAY HISTORY */
.pay-hist{max-height:180px;overflow-y:auto}
.phi{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.phi:last-child{border-bottom:none}
.phi-monto{font-family:'DM Mono',monospace;font-weight:600;color:var(--green);min-width:56px}
.phi-m{padding:2px 6px;border-radius:10px;font-size:10px;font-weight:500}
.pm-qr{background:var(--blue-light);color:var(--blue)}
.pm-efectivo{background:var(--green-light);color:var(--green)}
.phi-del{width:18px;height:18px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--red);font-size:12px;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
.phi-del:hover{background:var(--red-light)}
.no-pay{padding:16px;text-align:center;font-size:12px;color:var(--text3)}

/* MATERIALS */
.mat-item{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;background:#fff}
.mat-item:last-child{border-bottom:none}
.mat-item:hover{background:#f7f7f5}
.mat-item.checked{background:#f0fef4}
.mcheck{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.mat-item.checked .mcheck{background:var(--purple);border-color:var(--purple)}
.mcheck svg{display:none}
.mat-item.checked .mcheck svg{display:block}
.mat-text{flex:1}
.mat-name{font-size:12px;color:var(--text);line-height:1.3}
.mat-meta{font-size:10px;color:var(--text3)}

/* BADGES */
.badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px}
.b-ok{background:var(--green-light);color:var(--green)}.b-warn{background:var(--amber-light);color:var(--amber)}.b-err{background:var(--red-light);color:var(--red)}.b-purple{background:var(--purple-light);color:var(--purple-text)}.b-neu{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}.b-blue{background:var(--blue-light);color:var(--blue)}.b-teal{background:var(--teal-light);color:var(--teal)}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.ss{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;box-shadow:var(--shadow)}
.ss .l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.ss .v{font-size:20px;font-weight:600;font-family:'DM Mono',monospace}
.filter-row{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.fsel{padding:6px 9px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:12px;background:var(--surface);color:var(--text)}
.export-btn{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);font-family:inherit;font-size:12px;cursor:pointer;color:var(--text);box-shadow:var(--shadow)}
.export-btn:hover{background:var(--surface2)}
.twrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--surface2);padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface2);cursor:pointer}

/* HISTORY */
.hi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;box-shadow:var(--shadow);margin-bottom:7px}
.hi-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:2px}
.hi-stu{font-size:13px;font-weight:500}
.hi-c{font-size:11px;color:var(--text3);margin-left:4px}
.hi-t{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap}
.hi-msg{font-size:12px;color:var(--text2)}

/* ADMIN */
.adm-title{font-size:14px;font-weight:600;margin-bottom:12px}
.adm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.adm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
.adm-head{padding:9px 13px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.adm-head-title{font-size:13px;font-weight:500}
.adm-list{max-height:200px;overflow-y:auto}
.adm-item{display:flex;align-items:center;gap:7px;padding:6px 11px;border-bottom:1px solid var(--border);font-size:12px}
.adm-item:last-child{border-bottom:none}
.adm-item-name{flex:1;line-height:1.3}
.adm-item-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap}
.adm-del{width:20px;height:20px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--red);font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
.adm-del:hover{background:var(--red-light)}
.adm-add{display:flex;gap:6px;padding:8px 11px;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap}
.adm-in{flex:1;min-width:70px;padding:6px 8px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:12px;background:var(--surface);color:var(--text)}
.adm-in:focus{outline:none;border-color:var(--purple)}
.adm-in.sm{width:56px;flex:none}
.add-btn{padding:6px 11px;background:var(--purple);color:white;border:none;border-radius:7px;font-family:inherit;font-size:12px;cursor:pointer;white-space:nowrap}
.add-btn:hover{opacity:.9}
.add-btn.g{background:var(--teal)}
.imp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px}
.imp-body{padding:13px}
.imp-desc{font-size:12px;color:var(--text2);margin-bottom:9px;line-height:1.6}
.imp-ta{width:100%;min-height:90px;border:1px solid var(--border);border-radius:8px;padding:8px;font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);color:var(--text);resize:vertical;margin-bottom:7px}
.imp-ta:focus{outline:none;border-color:var(--purple);background:var(--surface)}
.imp-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.imp-sel{padding:6px 9px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:12px;background:var(--surface);color:var(--text)}
.imp-btn{padding:7px 14px;background:var(--teal);color:white;border:none;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer}
.imp-btn:hover{opacity:.9}
.imp-btn.red{background:var(--red)}
.imp-btn.blue{background:var(--blue)}
.imp-res{font-size:12px;padding:6px 9px;border-radius:6px;display:none;margin-top:6px}
.imp-res.ok{background:var(--green-light);color:var(--green);display:block}
.imp-res.err{background:var(--red-light);color:var(--red);display:block}
.kp-list{padding:9px 12px}
.kp-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.kp-item:last-child{border-bottom:none}
.kp-name{flex:1;color:var(--text2)}
.kp-in{width:78px;padding:4px 7px;border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;text-align:right;background:var(--surface2);color:var(--text)}
.kp-in:focus{outline:none;border-color:var(--purple)}
.save-kp{padding:7px 14px;background:var(--green);color:white;border:none;border-radius:var(--radius);font-family:inherit;font-size:12px;cursor:pointer}
.pass-sec{padding:12px}
.pass-row{display:flex;gap:8px;align-items:center;margin-bottom:9px}
.pass-lbl{font-size:12px;color:var(--text2);width:110px;flex-shrink:0}
.pass-in{flex:1;padding:6px 9px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;background:var(--surface2);color:var(--text)}
.pass-in:focus{outline:none;border-color:var(--purple)}
.save-pass{padding:7px 14px;background:var(--amber);color:white;border:none;border-radius:var(--radius);font-family:inherit;font-size:12px;cursor:pointer}
.adm-msg{font-size:12px;padding:5px 9px;border-radius:6px;margin-top:7px;display:none}
.adm-msg.ok{background:var(--green-light);color:var(--green);display:block}
.adm-msg.err{background:var(--red-light);color:var(--red);display:block}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo-prev{width:50px;height:50px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.logo-prev img{width:100%;height:100%;object-fit:cover}
.logo-upbtn{padding:7px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-family:inherit;font-size:12px;cursor:pointer;color:var(--text)}
.logo-upbtn:hover{background:var(--surface2)}

/* INVENTORY */
.inv-tbl{width:100%;border-collapse:collapse;font-size:12px}
.inv-tbl th{background:var(--surface2);padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap}
.inv-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
.inv-tbl tr:last-child td{border-bottom:none}

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, onValue, set, push, update } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';
import { getStorage } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

const FB = {
  apiKey:"AIzaSyC84vZxxhnDcTWmjD-6Ytz5p0BfK6yLFcg",
  authDomain:"ventas-2026-66b26.firebaseapp.com",
  databaseURL:"https://ventas-2026-66b26-default-rtdb.firebaseio.com",
  projectId:"ventas-2026-66b26",
  storageBucket:"ventas-2026-66b26.firebasestorage.app",
  messagingSenderId:"695334960314",
  appId:"1:695334960314:web:4d43a637223aed1610d683"
};

const PRIM=['1ro P.Azul','1ro P.Rojo','2do P.Azul','2do P.Rojo','3ro P.Azul','3ro P.Rojo','4to P.Azul','4to P.Rojo','5to P.Azul','5to P.Rojo','6to P.Azul','6to P.Rojo'];
const SECU=['1ro S.Azul','1ro S.Rojo','1ro S.Blanco','2do S.Azul','2do S.Rojo','2do S.Blanco','3ro S.Azul','3ro S.Rojo','3ro S.Blanco','4to S.Azul','4to S.Rojo','4to S.Blanco','5to QB','5to FM','6to QB','6to FM'];
const ALL_C=[...PRIM.map(c=>({n:'Primaria',c})),...SECU.map(c=>({n:'Secundaria',c}))];

const gradeKey=curso=>{
  const g=curso.split(' ')[0], suf=curso.split(' ')[1]||'';
  if((g==='5to'||g==='6to')&&(suf==='QB'||suf==='FM')) return g+'_'+suf;
  if(suf.startsWith('P.')) return 'P_'+g;
  if(suf.startsWith('S.')) return 'S_'+g;
  return g;
};

const fk=s=>String(s).replace(/[.#$[\]\s\/]/g,'_');
const ck=(n,c)=>fk(n+'_'+c);
const now=()=>new Date().toLocaleString('es-BO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
const nowFull=()=>new Date().toLocaleString('es-BO',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
const initials=n=>n.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();

// ── STATE ──
let PASS_T='profe2025', PASS_A='admin2025';
let db, cfg={}, studentsDB={}, cobrosDB={}, matsDB={}, kitPDB={}, inventarioDB={};
let ventasMenorDB={}, ventasMayorDB={};
let role=null, nivel='Primaria', curso=PRIM[0], idx=0, tab='student', saveT=null;
let savedFilter={fn:'Todos',fc:'Todos',fe:'Todos'};
let lastToggleTime=0, stuFilter='todos';
let adminState={impNivel:'Primaria',impCurso:'',impMg:'1ro'};
let lastAdmAction=0, lastPayTime=0, lastInvAction=0;
let isSaving=false; // Flag para bloquear onValue durante guardado
let schoolQR='', schoolLogo='', schoolName='Importadora REDY';
let ticketQR=''; // QR específico del ticket de kits
let ticketCfg={
  titulo:'Unidad Educativa Kanata',
  subtitulo:'Taller de Robótica y Programación',
  celular:'',
  detalles:'Conserve este ticket.',
  paralelos:{}
  // paralelos: {curso: 'nombre proyecto'} ej: {'1ro S.Azul':'Robot seguidor'}
};
let seccion='kits';
// Carrito tienda
let carritoMenor=[], carritoMayor=[];
let tiendaTab='ventas'; // 'ventas'|'historial'|'detalle'
let mayorTab='ventas';

// ── SESSION ──
function saveSession(r){try{localStorage.setItem('redy_role',r);}catch(e){}}
function loadSession(){try{return localStorage.getItem('redy_role');}catch(e){return null;}}
function clearSession(){try{localStorage.removeItem('redy_role');}catch(e){}}

// ── HELPERS ──
const getStudents=()=>studentsDB[ck(nivel,curso)]||[];
const getMats=(g)=>matsDB[g||gradeKey(curso)]||[];
const getKitP=(g)=>kitPDB[g||gradeKey(curso)]||0;

// Firebase no permite arrays — convertir objeto Firebase {0:{},1:{}} a array JS
function fbObjToArr(v){
  if(!v) return [];
  if(Array.isArray(v)) return v;
  return Object.keys(v).sort((a,b)=>Number(a)-Number(b)).map(k=>v[k]);
}

const defStu=()=>({components:{},payments:{},armado:false,entregado:false,observacion:''});

function sanitizeComponents(comps, mats){
  // Migrar claves con punto (ej: 1775748702337.359) al formato nuevo ('m'+int)
  if(!comps) return {};
  const result={};
  Object.keys(comps).forEach(k=>{
    const clean=k.replace(/\./g,'_');
    result[clean]=comps[k];
  });
  return result;
}
function getStuData(nombre){
  const k=ck(nivel,curso);
  if(!cobrosDB[k]) cobrosDB[k]={};
  const d=cobrosDB[k][fk(nombre)];
  if(!d){
    const tmp=defStu();tmp._esNuevo=true;return tmp;
  }
  if(!d.components) d.components={};
  if(!d.payments) d.payments={};
  getMats().forEach(m=>{if(d.components[m.id]===undefined) d.components[m.id]=false;});
  return d;
}
function getStuDataForWrite(nombre){
  const k=ck(nivel,curso);
  if(!cobrosDB[k]) cobrosDB[k]={};
  if(!cobrosDB[k][fk(nombre)]) cobrosDB[k][fk(nombre)]=defStu();
  const d=cobrosDB[k][fk(nombre)];
  if(!d.components) d.components={};
  if(!d.payments) d.payments={};
  getMats().forEach(m=>{if(d.components[m.id]===undefined) d.components[m.id]=false;});
  return d;
}

// payments se guarda como objeto Firebase {key: {monto,metodo,fecha}}
// usar push key timestamp como llave
function addPayment(d, monto, metodo){
  if(!d.payments) d.payments={};
  const key='p'+Date.now();
  d.payments[key]={monto,metodo,fecha:now(),quien:role||'teacher'};
  return key;
}
function getPaymentsArr(d){
  return fbObjToArr(d.payments);
}
const totalPag=d=>{
  const arr=fbObjToArr(d.payments);
  return arr.reduce((s,p)=>s+(parseFloat(p?.monto)||0),0);
};
const selMatsTotal=d=>{let t=0;getMats().forEach(m=>{if(d.components?.[m.id]) t+=m.price*m.qty;});return t;};
const getSaldo=d=>selMatsTotal(d)-totalPag(d);
const matsDone=d=>getMats().filter(m=>d.components?.[m.id]).length;

// ── SAVE STATUS ──
function setSS(s){
  const dot=document.getElementById('sdot'),txt=document.getElementById('stxt');
  if(!dot||!txt)return;
  dot.className='sdot'+(s==='saving'?' saving':s==='error'?' error':'');
  txt.textContent=s==='saved'?'Guardado':s==='saving'?'Guardando...':'Error';
}

// Guardado usando set() en el nodo completo del estudiante.
// Un solo set() = una sola escritura = un solo disparo de onValue.
async function saveStu(nombre){
  if(!db) return;
  const k=ck(nivel,curso);
  const d=cobrosDB[k]?.[fk(nombre)];
  if(!d){ setSS('saved'); return; }
  setSS('saving');
  isSaving=true;
  lastPayTime=Date.now();
  const dataToSave={
    payments: d.payments||null,
    components: (()=>{
      // Sanitizar claves: Firebase no permite '.' en keys
      const c={};
      Object.keys(d.components||{}).forEach(k=>{c[k.replace(/\./g,'_')]=d.components[k];});
      return c;
    })(),
    armado: !!d.armado,
    entregado: !!d.entregado,
    observacion: d.observacion||''
  };
  if(d.fechaArmado) dataToSave.fechaArmado=d.fechaArmado;
  try{
    await set(ref(db,'cobros/'+k+'/'+fk(nombre)), dataToSave);
    setSS('saved');
  }catch(e){
    setSS('error');
    console.error('saveStu ERROR - código:', e.code, '| mensaje:', e.message, '| path: cobros/'+k+'/'+fk(nombre));
    setTimeout(()=>saveStu(nombre),3000);
  } finally {
    isSaving=false;
  }
}
const schedSave=n=>{setSS('saving');clearTimeout(saveT);saveT=setTimeout(()=>saveStu(n),600);};
const saveCfg=async()=>{try{await set(ref(db,'config'),cfg);}catch(e){}};
const saveMats=async()=>{try{await set(ref(db,'materials'),matsDB);}catch(e){}};
const saveKPs=async()=>{try{await set(ref(db,'kitPrices'),kitPDB);}catch(e){}};
const saveStus=async()=>{try{await set(ref(db,'students'),studentsDB);}catch(e){}};
const saveInv=async()=>{try{await set(ref(db,'inventario'),inventarioDB);}catch(e){console.warn('saveInv:',e);}};

function updateBranding(){

// ── LOGIN / APP ──
function showLogin(){

}

function showApp(r){
  role=r; saveSession(r);
  document.getElementById('login-screen').style.display='none';

  document.getElementById('loading').style.display='none';

    const subrow=document.getElementById('kit-subrow');

window.doLogout=()=>{
  role=null;clearSession();
  document.getElementById('lpass').value='';
  // Ocultar barras de nav al cerrar sesión
  const subrow=document.getElementById('kit-subrow');
  if(subrow) subrow.style.display='none';
  const sn=document.getElementById('sec-nav');
  if(sn) sn.style.display='none';
  showLogin();
};
document.getElementById('lpass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
window.doLogin=function(){
  const p=document.getElementById('lpass').value.trim();
  const err=document.getElementById('lerr');
  err.style.display='none';
  if(p===PASS_A) showApp('admin');
  else if(p===PASS_T) showApp('teacher');
  else{err.style.display='block';document.getElementById('lpass').value='';}
};

// ── SECTION NAVIGATION (admin) ──
window.setSeccion=function(s){
  seccion=s;
  ['kits','menor','mayor','inventario','resgen'].forEach(id=>{
    const btn=document.getElementById('snb-'+id);
    if(btn) btn.classList.toggle('active', id===s);
  });
  const all=['vs','vr','vh','vv','vobs','va','vmenor','vmayor','vinv','vresgen'];
  all.forEach(id=>{const el=document.getElementById(id);if(el) el.style.display='none';});
  const subrow=document.getElementById('kit-subrow');
  if(s==='kits'){
    if(subrow) subrow.style.display='block';
    buildKitTabsAdmin();
    setTab('summary');
  } else {
    if(subrow) subrow.style.display='none';
    if(s==='menor'){document.getElementById('vmenor').style.display='';renderTienda('menor');}
    else if(s==='mayor'){document.getElementById('vmayor').style.display='';renderTienda('mayor');}
    else if(s==='inventario'){document.getElementById('vinv').style.display='';renderInv();}
    else if(s==='resgen'){document.getElementById('vresgen').style.display='';renderResGen();}
  }
};

// Tabs de kits para ADMIN (segunda fila)
function buildKitTabsAdmin(){
  const tabs=[
    {id:'summary',l:'Resumen'},{id:'student',l:'Detalle'},
    {id:'history',l:'Historial'},{id:'obs',l:'📝 Observaciones'},{id:'ventas',l:'📊 Ventas'},{id:'admin',l:'⚙ Admin',cls:'atab'}
  ];
  const ks=document.getElementById('kit-subtabs');
  if(ks) ks.innerHTML=tabs.map(t=>`<button class="tab-btn ${t.cls||''} ${tab===t.id?'active':''}" data-tab="${t.id}" onclick="setTab('${t.id}')">${t.l}</button>`).join('');
}

// Tabs de kits para PROFESOR (topbar)
function buildKitTabsTeacher(){

// ── COURSE BAR ──
function buildCourseBar(){
  const nivelOpts=['Primaria','Secundaria'].map(n=>`<option value="${n}" ${n===nivel?'selected':''}>${n}</option>`).join('');
  const cursos=nivel==='Primaria'?PRIM:SECU;
  const cursoOpts=cursos.map(c=>`<option value="${c}" ${c===curso?'selected':''}>${c}</option>`).join('');
  const stus=getStudents(), kitP=getKitP();
  const cobrado=stus.reduce((s,n)=>s+totalPag(getStuData(n)),0);
  const totalSel=stus.reduce((s,n)=>{const d=getStuData(n),mts=getMats();return s+mts.reduce((t,m)=>d.components?.[m.id]?t+m.price*m.qty:t,0);},0);
  const pend=Math.max(0,totalSel-cobrado);
  return`<div class="course-bar">
    <label>Nivel</label><select class="csel" id="csel-n">${nivelOpts}</select>
    <label>Curso</label><select class="csel" id="csel-c">${cursoOpts}</select>
    <div class="divv"></div>
    <span class="cbadge ${nivel==='Primaria'?'cb-p':'cb-s'}">${nivel}</span>
    <span class="cbadge cb-n">${curso} · ${stus.length} est.</span>
    ${role==='admin'?`<span class="cbadge cb-n" style="margin-left:auto">Kit Bs.${kitP} · Cobrado <span style="color:var(--green)">Bs.${cobrado.toFixed(1)}</span> · Pendiente <span style="color:${pend>0?'var(--amber)':'var(--green)'}">Bs.${pend.toFixed(1)}</span></span>`:''}
  </div>`;
}
function attachCB(){
  document.getElementById('csel-n')?.addEventListener('change',e=>{nivel=e.target.value;curso=(nivel==='Primaria'?PRIM:SECU)[0];idx=0;renderStu();});

window.regPay=(nombre,metodo,montoOverride)=>{
  const el=document.getElementById('pmonto');
  const monto=montoOverride||parseFloat(el?.value);
  if(!monto||monto<=0){el?.focus();if(!montoOverride){el?.classList.add('error-flash');setTimeout(()=>el?.classList.remove('error-flash'),600);}return;}
  const d=getStuDataForWrite(nombre);
  const selTotal=selMatsTotal(d),yaPagado=totalPag(d),saldoActual=selTotal-yaPagado;
  if(selTotal>0&&monto>saldoActual+0.01){
    const excMsg=document.getElementById('exc-msg');
    if(excMsg){
      const excTxt=document.getElementById('exc-txt');if(excTxt) excTxt.textContent='⚠ Monto excedido — saldo es Bs.'+saldoActual.toFixed(1)+'. ¿Continuar?';
      excMsg.style.display='flex';excMsg.dataset.nombre=nombre;excMsg.dataset.metodo=metodo;excMsg.dataset.monto=monto;
    }
    return;
  }
  addPayment(d,monto,metodo);
  if(el&&!montoOverride) el.value='';
  lastPayTime=Date.now();schedSave(nombre);renderStu();
};
window.delPay=(nombre,pkey)=>{
  if(!confirm('¿Eliminar este pago?'))return;
  const d=getStuDataForWrite(nombre);
  if(d.payments&&d.payments[pkey]) delete d.payments[pkey];
  schedSave(nombre);renderStu();
};
window.pagoRapidoQR=(nombre,montoKit)=>{
  const d=getStuDataForWrite(nombre);const mats=getMats();
  mats.forEach(m=>d.components[m.id]=true);
  const total=mats.reduce((s,m)=>s+m.price*m.qty,0);
  addPayment(d,total,'qr');
  lastPayTime=Date.now();schedSave(nombre);renderStu();
};
window.kitCompleto=(nombre)=>{
  const d=getStuDataForWrite(nombre);const mats=getMats();
  const allChecked=mats.every(m=>d.components?.[m.id]);
  mats.forEach(m=>d.components[m.id]=!allChecked);
  schedSave(nombre);renderStu();
};
window.confirmExcPay=function(){
  const el=document.getElementById('exc-msg');if(!el)return;
  const nombre=el.dataset.nombre,metodo=el.dataset.metodo,monto=parseFloat(el.dataset.monto);
  el.style.display='none';
  const d=getStuDataForWrite(nombre);
  addPayment(d,monto,metodo);
  const inp=document.getElementById('pmonto');if(inp) inp.value='';
  lastPayTime=Date.now();schedSave(nombre);renderStu();
};

function attachStuEvts(nombre){
  document.getElementById('ssel')?.addEventListener('change',e=>{idx=parseInt(e.target.value);renderStu();});
  document.getElementById('pb')?.addEventListener('click',()=>{if(idx>0){idx--;renderStu();}});
  document.getElementById('nb')?.addEventListener('click',()=>{
    const fl=document.getElementById('ssel')?.options.length||getStudents().length;
    if(idx<fl-1){idx++;renderStu();}
  });
  document.getElementById('pmonto')?.addEventListener('keydown',e=>{if(e.key==='Enter') window.regPay(nombre,'efectivo');});
  document.querySelectorAll('.mat-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const cid=item.dataset.cid;const d=getStuDataForWrite(nombre);
      if(!d.components) d.components={};
      d.components[cid]=!d.components[cid];schedSave(nombre);renderStu();
    });
  });
  document.getElementById('tc-armado')?.addEventListener('click',()=>{
    if(role!=='admin')return;
    const d=getStuDataForWrite(nombre);d.armado=!d.armado;
    if(d.armado){
      d.fechaArmado=now();
      // Descontar stock inventario
      getMats().forEach(m=>{
        if(d.components?.[m.id]&&m.itCodigo&&inventarioDB[m.itCodigo]){
          const prod=inventarioDB[m.itCodigo];
          prod.stock=Math.max(0,(prod.stock||0)-m.qty);
          set(ref(db,'inventario/'+m.itCodigo+'/stock'),prod.stock).catch(e=>console.warn('stock:',e));
        }
      });
    }
    schedSave(nombre);renderStu();
  });
  document.getElementById('tc-entregado')?.addEventListener('click',()=>{
    // Guardar SOLO el campo entregado directamente en Firebase, sin tocar el resto
    const k=ck(nivel,curso);
    const existing=cobrosDB[k]?.[fk(nombre)];
    const newVal=!(existing?.entregado||false);
    if(existing){
      existing.entregado=newVal;
      // Guardar solo el campo entregado para no sobreescribir nada más
      set(ref(db,'cobros/'+k+'/'+fk(nombre)+'/entregado'),newVal).then(()=>setSS('saved')).catch(e=>console.error('entregado error:',e.code,e.message));
    } else {
      // Si no hay datos locales, guardar solo entregado directamente en Firebase
      set(ref(db,'cobros/'+k+'/'+fk(nombre)+'/entregado'),newVal).then(()=>setSS('saved')).catch(e=>console.error('entregado error:',e.code,e.message));
    }
    renderStu();
  });
  let ot;
  document.getElementById('obsin')?.addEventListener('input',e=>{
    const d=getStuDataForWrite(nombre);d.observacion=e.target.value;
    clearTimeout(ot);ot=setTimeout(()=>schedSave(nombre),1000);
  });
}

// ── SUMMARY ──
function renderSum(){
  let rows=[],tCob=0,tPend=0,tEst=0;
  ALL_C.forEach(({n,c})=>{
    const k=ck(n,c),stus=studentsDB[k]||[],g=gradeKey(c),kp=kitPDB[g]||0;
    stus.forEach(nombre=>{
      const d=(cobrosDB[k]||{})[fk(nombre)];
      const mats=matsDB[g]||[],dn=d?mats.filter(m=>d.components?.[m.id]).length:0;
      const pag=d?totalPag(d):0;
      const stuSelTotal=d?mats.reduce((s,m)=>d.components?.[m.id]?s+m.price*m.qty:s,0):0;
      const sal=stuSelTotal-pag;
      tCob+=pag;tPend+=(sal>0?sal:0);tEst++;
      rows.push({n,c,nombre,kp,pag,sal,stuSelTotal,dn,total:mats.length,armado:d?.armado,entregado:d?.entregado});
    });
  });
  const pagados=rows.filter(r=>r.sal<=0&&(r.stuSelTotal||0)>0).length;
  const entregados=rows.filter(r=>r.entregado).length;
  const isAdm=role==='admin';
  const trows=rows.map(r=>{
    const noDone=r.dn===0,noMats=r.stuSelTotal===0||r.stuSelTotal===undefined;
    const pb=noMats?'b-neu':r.sal<=0?'b-ok':r.pag>0?'b-warn':'b-err';
    const pt=noMats?'No registrado':r.sal<=0?'Pagado':r.pag>0?('Bs.'+r.sal.toFixed(1)):'Sin pago';
    const si=studentsDB[ck(r.n,r.c)]?.indexOf(r.nombre)??0;
    const entClick=' onclick="toggleEntSum(\''+r.n+'\',\''+r.c+'\',\''+r.nombre+'\',event)" style="cursor:pointer"';
    const armadoCell=r.armado?'<span class="badge b-purple">✓ Armado</span>':'<span style="color:var(--text3);font-size:11px">—</span>';
    const entregadoCell=r.entregado?'<span class="badge b-ok"'+entClick+'>✓ Entregado</span>':'<span style="color:var(--text3);font-size:11px"'+entClick+'>— marcar</span>';
    const pagadoCell=isAdm?`<td style="font-family:'DM Mono',monospace">Bs.${r.pag.toFixed(1)}</td><td><span class="badge ${pb}">${pt}</span></td>`:`<td colspan="2"><span class="badge ${pb}">${pt}</span></td>`;

// ── VENTAS (kits) ──
function renderVentas(){
  const matSales={};let totalRevenue=0,totalUnitsSold=0,revenueAdmin=0,revenueProfe=0;
  ALL_C.forEach(({n,c})=>{
    const k=ck(n,c),g=gradeKey(c),stus=studentsDB[k]||[],mats=matsDB[g]||[];
    stus.forEach(nombre=>{
      const d=(cobrosDB[k]||{})[fk(nombre)];if(!d)return;
      const stuSelTotal=mats.reduce((s,m)=>d.components?.[m.id]?s+m.price*m.qty:s,0);
      const stuPaid=fbObjToArr(d.payments).reduce((s,p)=>s+(parseFloat(p?.monto)||0),0);
      if(stuSelTotal<=0||stuPaid<stuSelTotal)return;
      mats.forEach(m=>{
        if(!d.components?.[m.id])return;
        const key=g+'_'+m.id;
        if(!matSales[key]) matSales[key]={name:m.name,price:m.price,qty:m.qty,grade:g,unitsSold:0,revenue:0,courses:new Set()};
        const rev=m.price*m.qty;
        matSales[key].unitsSold+=m.qty;matSales[key].revenue+=rev;matSales[key].courses.add(c);
        totalRevenue+=rev;totalUnitsSold+=m.qty;
        // Asignar ingreso proporcionalmente por quien pagó
        const allPays=fbObjToArr(d.payments);
        const pagAdmin=allPays.filter(p=>!p?.quien||p?.quien==='admin').reduce((s,p)=>s+(parseFloat(p?.monto)||0),0);
        const pagProfe=allPays.filter(p=>p?.quien&&p?.quien!=='admin').reduce((s,p)=>s+(parseFloat(p?.monto)||0),0);
        const total2=pagAdmin+pagProfe;
        if(total2>0){revenueAdmin+=rev*(pagAdmin/total2);revenueProfe+=rev*(pagProfe/total2);}
        else revenueAdmin+=rev;
      });
    });
  });
  const salesArr=Object.values(matSales).sort((a,b)=>b.revenue-a.revenue);
  const top10u=[...salesArr].sort((a,b)=>b.unitsSold-a.unitsSold).slice(0,10);
  const maxU=top10u[0]?.unitsSold||1;
  const barW2=38,barGap=6,svgW=top10u.length*(barW2+barGap),svgH=130;
  const bars=top10u.map((m,i)=>{const h=Math.round(m.unitsSold/maxU*(svgH-50));const x=i*(barW2+barGap);const y=svgH-50-h;const words=m.name.split(' ');const line1=words.slice(0,2).join(' ').substring(0,10);const line2=words.slice(2,4).join(' ').substring(0,10);return`<rect x="${x}" y="${y}" width="${barW2}" height="${h}" fill="#534AB7" rx="3" opacity="0.85"/><text x="${x+barW2/2}" y="${y-4}" text-anchor="middle" font-size="9" fill="#6b6860">${m.unitsSold}</text><text x="${x+barW2/2}" y="${svgH-36}" text-anchor="middle" font-size="7.5" fill="#9b9890">${line1}</text>${line2?`<text x="${x+barW2/2}" y="${svgH-26}" text-anchor="middle" font-size="7.5" fill="#9b9890">${line2}</text>`:''}<text x="${x+barW2/2}" y="${svgH-16}" text-anchor="middle" font-size="7" fill="#b0aead">${words.slice(4).join(' ').substring(0,10)}</text>`;}).join('');
  const matRows=salesArr.map((m)=>{const pct=Math.round(m.revenue/totalRevenue*100)||0;const barW=Math.round(m.revenue/(salesArr[0]?.revenue||1)*100);return`<tr><td style="font-weight:500;font-size:12px;max-width:200px;white-space:normal;line-height:1.3">${m.name}</td><td style="font-size:11px;color:var(--text3);text-align:center">${m.grade}</td><td style="font-family:'DM Mono',monospace;text-align:right">Bs.${m.price}</td><td style="font-family:'DM Mono',monospace;text-align:right">${m.unitsSold}</td><td style="font-family:'DM Mono',monospace;text-align:right;color:var(--green);font-weight:600">Bs.${m.revenue.toFixed(0)}</td><td style="min-width:80px;padding-right:8px"><div style="background:var(--surface2);border-radius:3px;height:8px;overflow:hidden"><div style="width:${barW}%;height:100%;background:var(--purple);border-radius:3px"></div></div><div style="font-size:9px;color:var(--text3);margin-top:1px">${pct}%</div></td></tr>`;}).join('');
  document.getElementById('vv').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(${role==='admin'?6:4},1fr);gap:10px;margin-bottom:16px">
      <div class="ss"><div class="l">Materiales distintos</div><div class="v">${salesArr.length}</div></div>
      <div class="ss"><div class="l">Unidades vendidas</div><div class="v">${totalUnitsSold}</div></div>
      <div class="ss"><div class="l">Ingreso total</div><div class="v sv-ok">Bs.${totalRevenue.toFixed(1)}</div></div>
      ${role==='admin'?`<div class="ss" style="border-color:var(--amber)"><div class="l" style="color:var(--amber)">Admin cobró</div><div class="v" style="color:var(--amber)">Bs.${revenueAdmin.toFixed(1)}</div></div><div class="ss" style="border-color:var(--purple)"><div class="l" style="color:var(--purple)">Profe cobró</div><div class="v" style="color:var(--purple)">Bs.${revenueProfe.toFixed(1)}</div></div>`:''}
      <div class="ss"><div class="l">Top material</div><div class="v" style="font-size:12px;margin-top:2px">${salesArr[0]?.name?.split(' ').slice(0,2).join(' ')||'—'}</div></div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow)">
      <div style="font-size:12px;font-weight:500;margin-bottom:12px">Top 10 materiales por unidades vendidas</div>
      <div style="overflow-x:auto"><svg width="${Math.max(svgW,400)}" height="${svgH}" style="display:block">${bars}</svg></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px">
      <span style="font-size:12px;font-weight:500">Detalle materiales vendidos (${salesArr.length})</span>
      <div style="display:flex;gap:8px">
        <button class="export-btn" onclick="expCSV()">⬇ CSV Cobros</button>
        <button style="padding:6px 12px;border:1px solid var(--red);border-radius:var(--radius);background:var(--surface);font-family:inherit;font-size:12px;cursor:pointer;color:var(--red)" onclick="resetAll()">🗑 Resetear cobros</button>
      </div>
    </div>
    <div class="twrap"><table class="tbl">
      <thead><tr><th>Material</th><th>Grado</th><th>Precio unit.</th><th>Unidades</th><th>Ingreso</th><th>Proporción</th></tr></thead>
      <tbody>${matRows||'<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:2rem">Sin datos</td></tr>'}</tbody>
      ${salesArr.length?'<tfoot><tr style="background:var(--surface2)"><td colspan="3" style="font-weight:600;font-size:12px;padding:8px 10px">TOTAL</td><td style="font-family:DM Mono,monospace;font-weight:600;text-align:right;padding:8px 10px">'+totalUnitsSold+'</td><td style="font-family:DM Mono,monospace;font-weight:600;text-align:right;color:var(--green);padding:8px 10px">Bs.'+totalRevenue.toFixed(0)+'</td><td></td></tr></tfoot>':''}
    </table></div>`;
}
window.expCSV=()=>{
  let csv='Estudiante,Nivel,Curso,Pagado,Saldo,Materiales,Armado,Entregado\n';
  ALL_C.forEach(({n,c})=>{
    const k=ck(n,c),g=gradeKey(c),kp=kitPDB[g]||0,stus=studentsDB[k]||[],mats=matsDB[g]||[];

};

window.setTiendaTab=(tipo,t)=>{

window.buscarProducto=(tipo)=>{
  const q=(document.getElementById(`sp-${tipo}`)?.value||'').toLowerCase().trim();
  const sr=document.getElementById(`sr-${tipo}`);
  if(!sr)return;
  if(q.length<2){sr.style.display='none';return;}
  const precioField=tipo==='menor'?'precio_menor':'precio_mayor';
  const prods=Object.values(inventarioDB).filter(p=>p.nombre?.toLowerCase().includes(q)||p.codigo?.toLowerCase().includes(q)).slice(0,12);
  if(!prods.length){sr.style.display='none';return;}
  sr.innerHTML=prods.map(p=>{
    const precio=p[precioField]||0;const stk=p.stock||0;
    return`<div class="sr-item" onclick="agregarAlCarrito('${tipo}','${p.codigo}')">
      <span class="sr-code">${p.codigo}</span>
      <div style="flex:1"><div class="sr-name">${p.nombre}</div><div class="sr-stock">${stk>0?`Stock: ${stk}`:'<span style="color:var(--red)">Sin stock</span>'}</div></div>
      <span class="sr-price">Bs.${precio.toFixed(2)}</span>
    </div>`;
  }).join('');
  sr.style.display='block';
};

window.agregarAlCarrito=(tipo,codigo)=>{
  const prod=inventarioDB[codigo];if(!prod)return;
  const precioField=tipo==='menor'?'precio_menor':'precio_mayor';
  const precio=prod[precioField]||0;
  const carrito=tipo==='menor'?carritoMenor:carritoMayor;
  const existing=carrito.find(i=>i.codigo===codigo);
  if(existing) existing.qty++;
  else carrito.push({codigo,nombre:prod.nombre,precio,qty:1});
  const sr=document.getElementById(`sr-${tipo}`);if(sr)sr.style.display='none';
  const sp=document.getElementById(`sp-${tipo}`);if(sp)sp.value='';
  renderTienda(tipo);
};

window.cambiarQty=(tipo,i,delta)=>{
  const carrito=tipo==='menor'?carritoMenor:carritoMayor;
  carrito[i].qty+=delta;
  if(carrito[i].qty<=0) carrito.splice(i,1);
  renderTienda(tipo);
};
window.quitarItem=(tipo,i)=>{
  const carrito=tipo==='menor'?carritoMenor:carritoMayor;
  carrito.splice(i,1);renderTienda(tipo);
};
window.limpiarCarrito=(tipo)=>{
  if(tipo==='menor') carritoMenor=[]; else carritoMayor=[];renderTienda(tipo);
};
window.actualizarTotal=(tipo)=>{
  const carrito=tipo==='menor'?carritoMenor:carritoMayor;
  const desc=parseFloat(document.getElementById(`desc-${tipo}`)?.value)||0;
  const total=Math.max(0,carrito.reduce((s,i)=>s+i.precio*i.qty,0)-desc);
  const ctEl=document.getElementById(`ct-val-${tipo}`);
  if(ctEl) ctEl.textContent='Bs.'+total.toFixed(2);
};

window.cobrarTienda=async(tipo,metodo)=>{
  const carrito=tipo==='menor'?carritoMenor:carritoMayor;
  if(!carrito.length){alert('El carrito está vacío.');return;}
  const desc=parseFloat(document.getElementById(`desc-${tipo}`)?.value)||0;
  const subtotal=carrito.reduce((s,i)=>s+i.precio*i.qty,0);
  const total=Math.max(0,subtotal-desc);
  const cliente=(document.getElementById(`cliente-${tipo}`)?.value||'').trim();
  const venta={fecha:nowFull(),metodo,cliente:cliente||'',total,descuento:desc,items:carrito.map(i=>({...i})),tipo};
  // Descontar stock
  carrito.forEach(item=>{
    if(inventarioDB[item.codigo]){
      inventarioDB[item.codigo].stock=Math.max(0,(inventarioDB[item.codigo].stock||0)-item.qty);
      set(ref(db,'inventario/'+item.codigo+'/stock'),inventarioDB[item.codigo].stock).catch(e=>console.warn(e));
    }
  });
  // Guardar venta
  const dbPath=tipo==='menor'?'ventas_menor':'ventas_mayor';
  try{
    const nr=push(ref(db,dbPath));
    venta._key=nr.key;
    await set(nr,venta);
    if(tipo==='menor') ventasMenorDB[nr.key]=venta; else ventasMayorDB[nr.key]=venta;
  }catch(e){console.warn('saveVenta:',e);}
  // Limpiar
  if(tipo==='menor') carritoMenor=[]; else carritoMayor=[];
  setSS('saved');
  renderTienda(tipo);
};

window.delVentaTienda=async(tipo,key)=>{
  if(!confirm('¿Eliminar esta venta?'))return;
  const dbPath=tipo==='menor'?'ventas_menor':'ventas_mayor';
  try{await set(ref(db,dbPath+'/'+key),null);}catch(e){}
  if(tipo==='menor') delete ventasMenorDB[key]; else delete ventasMayorDB[key];
  renderTienda(tipo);
};

window.filterInv=()=>{
  const q=(document.getElementById('inv-search')?.value||'').toLowerCase();
  const cat=document.getElementById('inv-cat')?.value||'';
  const sf=document.getElementById('inv-sf')?.value||'';
  document.querySelectorAll('#inv-tbody tr').forEach(row=>{
    const txt=row.textContent.toLowerCase();
    const stk=parseInt(row.cells[3]?.textContent)||0;const smin=5;
    const matchQ=!q||txt.includes(q);const matchC=!cat||txt.includes(cat.toLowerCase());
    const matchS=!sf||(sf==='bajo'&&stk>0&&stk<=smin)||(sf==='sin'&&stk===0)||(sf==='ok'&&stk>smin);
    row.style.display=(matchQ&&matchC&&matchS)?'':'none';
  });
};

};

        <td><input class="edit-in" type="number" value="${p.precio_compra||0}" onchange="updateInvField('${p.codigo}','precio_compra',this.value)"></td>

        <td><input class="edit-in" type="number" value="${p.precio_menor||0}" onchange="updateInvField('${p.codigo}','precio_menor',this.value)"></td>

    </table></div>`;
}

window.filterInvAdmin=()=>{
  const q=(document.getElementById('inv-adm-search')?.value||'').toLowerCase().trim();
  document.querySelectorAll('#inv-adm-tbody tr').forEach(row=>{
    row.style.display=(!q||row.dataset.search?.includes(q))?'':'none';
  });
};

window.importInv=async(replace)=>{
  if(replace&&!confirm('¿Reemplazar TODO el inventario? No se puede deshacer.'))return;
  const raw=document.getElementById('inv-imp-ta')?.value||'';
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);
  if(!lines.length){showImpRes('inv-imp-res','No hay datos','err');return;}
  if(replace) inventarioDB={};
  let added=0,updated=0;
  lines.forEach(line=>{
    const p=line.split('\t');if(p.length<2)return;
    const cod=(p[0]||'').trim().toUpperCase();if(!cod)return;
    const isNew=!inventarioDB[cod];
    inventarioDB[cod]={codigo:cod,nombre:(p[1]||'').trim(),categoria:(p[2]||'').trim(),stock:parseFloat(p[3])||0,stock_min:parseFloat(p[4])||5,precio_compra:parseFloat(p[5])||0,precio_kit:parseFloat(p[6])||0,precio_menor:parseFloat(p[7])||0,precio_mayor:parseFloat(p[8])||0,ubicacion:(p[9]||'').trim()};
    if(isNew) added++; else updated++;
  });
  lastInvAction=Date.now();await saveInv();
  document.getElementById('inv-imp-ta').value='';
  showImpRes('inv-imp-res',`✓ ${added} nuevos, ${updated} actualizados. Total: ${Object.keys(inventarioDB).length}`,'ok');
  renderInvAdmin();
};
window.saveOneProd=async()=>{
  const cod=(document.getElementById('nit-cod')?.value||'').trim().toUpperCase();
  const nom=(document.getElementById('nit-nom')?.value||'').trim();
  if(!cod||!nom){showMsg('nit-msg','Código y nombre son obligatorios','err');return;}
  inventarioDB[cod]={codigo:cod,nombre:nom,categoria:(document.getElementById('nit-cat')?.value||'').trim(),ubicacion:(document.getElementById('nit-ubi')?.value||'').trim(),stock:parseFloat(document.getElementById('nit-stk')?.value)||0,stock_min:parseFloat(document.getElementById('nit-smin')?.value)||5,precio_compra:parseFloat(document.getElementById('nit-pc')?.value)||0,precio_kit:parseFloat(document.getElementById('nit-pk')?.value)||0,precio_menor:parseFloat(document.getElementById('nit-pm')?.value)||0,precio_mayor:parseFloat(document.getElementById('nit-pmy')?.value)||0};
  lastInvAction=Date.now();await saveInv();showMsg('nit-msg','✓ Guardado: '+cod,'ok');clearInvForm();renderInvAdmin();
};
window.editProd=(codigo)=>{
  const p=inventarioDB[codigo];if(!p)return;
  ['cod','nom','cat','ubi'].forEach((f,i)=>{const el=document.getElementById('nit-'+f);if(el)el.value=[p.codigo,p.nombre,p.categoria,p.ubicacion][i]||'';});
  ['stk','smin','pc','pk','pm','pmy'].forEach((f,i)=>{const el=document.getElementById('nit-'+f);if(el)el.value=[p.stock,p.stock_min,p.precio_compra,p.precio_kit,p.precio_menor,p.precio_mayor][i]||0;});
  document.getElementById('nit-cod')?.scrollIntoView({behavior:'smooth',block:'center'});
};
window.clearInvForm=()=>['cod','nom','cat','ubi','stk','smin','pc','pk','pm','pmy'].forEach(id=>{const el=document.getElementById('nit-'+id);if(el)el.value='';});
window.delProd=async(codigo)=>{
  if(!confirm('¿Eliminar '+codigo+'?'))return;
  delete inventarioDB[codigo];lastInvAction=Date.now();await saveInv();renderInvAdmin();
};
window.updateInvField=async(codigo,field,val)=>{
  if(!inventarioDB[codigo])return;
  inventarioDB[codigo][field]=isNaN(parseFloat(val))?val:parseFloat(val);
  lastInvAction=Date.now();
  try{await set(ref(db,'inventario/'+codigo+'/'+field),inventarioDB[codigo][field]);}catch(e){}
};
window.resetInv=async()=>{
  if(!confirm('¿Borrar TODO el inventario?'))return;
  if(!confirm('Segunda confirmación: ¿Seguro?'))return;
  inventarioDB={};await set(ref(db,'inventario'),null);renderInvAdmin();
};

// ── RESUMEN GENERAL ──
function renderResGen(){
  const prods=Object.values(inventarioDB);
  const capitalCompra=prods.reduce((s,p)=>s+(p.precio_compra||0)*(p.stock||0),0);
  const capitalMenor=prods.reduce((s,p)=>s+(p.precio_menor||0)*(p.stock||0),0);
  const stockBajo=prods.filter(p=>(p.stock||0)<=(p.stock_min||5)&&(p.stock||0)>0).length;
  const sinStock=prods.filter(p=>(p.stock||0)===0).length;

  // Ganancias kits
  let ganKits=0,ingKits=0;
  ALL_C.forEach(({n,c})=>{
    const k=ck(n,c),g=gradeKey(c),stus=studentsDB[k]||[],mats=matsDB[g]||[];
    stus.forEach(nombre=>{
      const d=(cobrosDB[k]||{})[fk(nombre)];if(!d?.armado)return;
      mats.forEach(m=>{
        if(!d.components?.[m.id])return;
        ingKits+=m.price*m.qty;
        const costo=m.itCodigo&&inventarioDB[m.itCodigo]?(inventarioDB[m.itCodigo].precio_compra||0):0;
        ganKits+=(m.price-costo)*m.qty;
      });
    });
  });
  let ingMenor=0,ganMenor=0;
  Object.values(ventasMenorDB).forEach(v=>{ingMenor+=(v.total||0);(v.items||[]).forEach(i=>{const c=inventarioDB[i.codigo]?.precio_compra||0;ganMenor+=(i.precio-c)*i.qty;});});
  let ingMayor=0,ganMayor=0;
  Object.values(ventasMayorDB).forEach(v=>{ingMayor+=(v.total||0);(v.items||[]).forEach(i=>{const c=inventarioDB[i.codigo]?.precio_compra||0;ganMayor+=(i.precio-c)*i.qty;});});

  const totalIngresos=ingKits+ingMenor+ingMayor;
  const totalGanancias=ganKits+ganMenor+ganMayor;
  const totalCostos=totalIngresos-totalGanancias;

  // ── GRÁFICO 1: Barras de ingresos vs ganancias por canal ──
  const canales=[
    {lbl:'Kits',ing:ingKits,gan:ganKits,color:'#534AB7'},
    {lbl:'Menor',ing:ingMenor,gan:ganMenor,color:'#0F6E56'},
    {lbl:'Mayor',ing:ingMayor,gan:ganMayor,color:'#C05E0A'},
  ];
  const maxIng=Math.max(...canales.map(c=>c.ing),1);
  const bw=90,gap=40,svgW=canales.length*(bw*2+gap)+gap,svgH=160;
  const barras1=canales.map((c,i)=>{
    const x=gap+i*(bw*2+gap);
    const hi=Math.round(c.ing/maxIng*(svgH-40));
    const hg=Math.round(c.gan/maxIng*(svgH-40));
    const yi=svgH-20-hi, yg=svgH-20-hg;
    return`
      <rect x="${x}" y="${yi}" width="${bw}" height="${hi}" fill="${c.color}" rx="3" opacity="0.85"/>
      <rect x="${x+bw+4}" y="${yg}" width="${bw}" height="${hg}" fill="${c.color}" rx="3" opacity="0.4"/>
      <text x="${x+bw/2}" y="${yi-5}" text-anchor="middle" font-size="9" fill="#6b6860">${c.ing>0?'Bs.'+c.ing.toFixed(0):''}</text>
      <text x="${x+bw+4+bw/2}" y="${yg-5}" text-anchor="middle" font-size="9" fill="#6b6860">${c.gan>0?'Bs.'+c.gan.toFixed(0):''}</text>
      <text x="${x+bw}" y="${svgH-5}" text-anchor="middle" font-size="10" fill="#1a1917" font-weight="500">${c.lbl}</text>`;
  }).join('');

  // ── GRÁFICO 2: Donut de distribución de ingresos ──
  const donutData=canales.filter(c=>c.ing>0);
  const donutColors=['#534AB7','#0F6E56','#C05E0A'];
  let donutPaths='',startAngle=0;
  const cx=80,cy=70,r=55,ri=32;
  donutData.forEach((c,i)=>{
    const pct=c.ing/totalIngresos;const angle=pct*2*Math.PI;const endAngle=startAngle+angle;
    const x1=cx+r*Math.sin(startAngle),y1=cy-r*Math.cos(startAngle);
    const x2=cx+r*Math.sin(endAngle),y2=cy-r*Math.cos(endAngle);
    const xi1=cx+ri*Math.sin(startAngle),yi1=cy-ri*Math.cos(startAngle);
    const xi2=cx+ri*Math.sin(endAngle),yi2=cy-ri*Math.cos(endAngle);
    const large=angle>Math.PI?1:0;
    if(pct>0) donutPaths+=`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${xi2.toFixed(1)},${yi2.toFixed(1)} A${ri},${ri} 0 ${large},0 ${xi1.toFixed(1)},${yi1.toFixed(1)} Z" fill="${donutColors[i]}" opacity="0.85" stroke="#fff" stroke-width="1.5"/>`;
    startAngle=endAngle;
  });

  // ── GRÁFICO 3: Top 8 productos por margen (barras horizontales) ──
  const topMargen=prods.map(p=>{const m=p.precio_menor&&p.precio_compra?((p.precio_menor-p.precio_compra)/p.precio_menor*100):0;return{...p,margen:m};}).filter(p=>p.margen>0).sort((a,b)=>b.margen-a.margen).slice(0,8);
  const maxM=topMargen[0]?.margen||1;
  const hbars=topMargen.map((p,i)=>{
    const bw2=Math.round(p.margen/maxM*220);
    const color=p.margen>=50?'#3B6D11':p.margen>=30?'#534AB7':'#854F0B';
    const shortName=p.nombre.substring(0,24)+(p.nombre.length>24?'…':'');
    return`<g>
      <text x="0" y="${i*22+13}" font-size="9" fill="#6b6860" dominant-baseline="middle">${shortName}</text>
      <rect x="230" y="${i*22+4}" width="${bw2}" height="13" fill="${color}" rx="3" opacity="0.8"/>
      <text x="${232+bw2}" y="${i*22+13}" font-size="9" fill="${color}" dominant-baseline="middle" font-weight="600">${p.margen.toFixed(0)}%</text>
    </g>`;
  }).join('');

  // ── GRÁFICO 4: Stock por categoría (barras) ──
  const catStock={};
  prods.forEach(p=>{const cat=p.categoria||'Otros';if(!catStock[cat])catStock[cat]={total:0,bajo:0};catStock[cat].total+=(p.stock||0);if((p.stock||0)<=(p.stock_min||5))catStock[cat].bajo++;});
  const catArr=Object.entries(catStock).sort((a,b)=>b[1].total-a[1].total).slice(0,8);
  const maxCat=catArr[0]?.[1]?.total||1;
  const catBars=catArr.map((c,i)=>{
    const bw3=Math.round(c[1].total/maxCat*200);
    const shortCat=c[0].substring(0,22)+(c[0].length>22?'…':'');
    return`<g>
      <text x="0" y="${i*22+13}" font-size="9" fill="#6b6860" dominant-baseline="middle">${shortCat}</text>
      <rect x="180" y="${i*22+4}" width="${bw3}" height="13" fill="#185FA5" rx="3" opacity="${c[1].bajo>0?'0.5':'0.8'}"/>
      <text x="${184+bw3}" y="${i*22+13}" font-size="9" fill="#185FA5" dominant-baseline="middle" font-weight="600">${c[1].total}</text>
    </g>`;
  }).join('');

  // Top capital
  const topCapital=prods.map(p=>({...p,valorStock:(p.precio_compra||0)*(p.stock||0)})).sort((a,b)=>b.valorStock-a.valorStock).slice(0,8);

  document.getElementById('vresgen').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div style="font-size:15px;font-weight:600">📊 Resumen General — Importadora REDY</div>
      <div style="display:flex;gap:8px">
        <button class="export-btn" onclick="expResGenCSV()">⬇ CSV</button>
        <button style="padding:6px 12px;border:1px solid var(--red);border-radius:var(--radius);background:var(--surface);font-family:inherit;font-size:12px;cursor:pointer;color:var(--red)" onclick="resetVentas()">🗑 Resetear ventas</button>
      </div>
    </div>

    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px">
      <div class="ss"><div class="l">Productos</div><div class="v">${prods.length}</div></div>
      <div class="ss"><div class="l">Capital (costo)</div><div class="v sv-ok">Bs.${capitalCompra.toFixed(0)}</div></div>
      <div class="ss"><div class="l">Ingresos totales</div><div class="v" style="color:var(--blue)">Bs.${totalIngresos.toFixed(0)}</div></div>
      <div class="ss"><div class="l">Ganancias totales</div><div class="v" style="color:var(--teal)">Bs.${totalGanancias.toFixed(0)}</div></div>
      <div class="ss"><div class="l">Stock bajo / sin stock</div><div class="v ${stockBajo+sinStock>0?'sv-warn':'sv-ok'}">${stockBajo} / ${sinStock}</div></div>
    </div>

    <!-- GRÁFICOS FILA 1 -->
    <div style="display:grid;grid-template-columns:1fr 220px;gap:12px;margin-bottom:14px">

      <!-- Barras ingresos vs ganancias -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow)">
        <div style="font-size:12px;font-weight:600;margin-bottom:4px">💰 Ingresos vs Ganancias por canal</div>
        <div style="display:flex;gap:14px;font-size:10px;color:var(--text3);margin-bottom:8px">
          <span>■ <span style="color:#534AB7">Kits</span></span>
          <span>■ <span style="color:#0F6E56">Por Menor</span></span>
          <span>■ <span style="color:#C05E0A">Por Mayor</span></span>
          <span style="margin-left:auto">Barra oscura = ingreso · Barra clara = ganancia</span>
        </div>
        <div style="overflow-x:auto">
          <svg width="${Math.max(svgW,360)}" height="${svgH}" style="display:block">${barras1}
            <line x1="0" y1="${svgH-20}" x2="${svgW}" y2="${svgH-20}" stroke="#e2e0d8" stroke-width="1"/>
          </svg>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;border-top:1px solid var(--border);padding-top:10px">
          ${canales.map(c=>`<div style="text-align:center"><div style="font-size:10px;color:var(--text3)">${c.lbl}</div><div style="font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--green)">Bs.${c.ing.toFixed(0)}</div><div style="font-size:10px;color:var(--teal)">Gan: Bs.${c.gan.toFixed(0)}</div></div>`).join('')}
        </div>
      </div>

      <!-- Donut distribución -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow)">
        <div style="font-size:12px;font-weight:600;margin-bottom:8px">🥧 Distribución ingresos</div>
        ${totalIngresos>0?`
        <svg width="160" height="140" style="display:block;margin:0 auto">
          ${donutPaths}
          <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="9" fill="#6b6860">Total</text>
          <text x="${cx}" y="${cy+8}" text-anchor="middle" font-size="10" fill="#1a1917" font-weight="600">Bs.${totalIngresos.toFixed(0)}</text>
        </svg>
        <div style="font-size:10px;margin-top:4px">
          ${donutData.map((c,i)=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px"><span style="width:10px;height:10px;border-radius:2px;background:${donutColors[i]};flex-shrink:0;display:inline-block"></span><span style="color:var(--text2)">${c.lbl}</span><span style="margin-left:auto;font-family:'DM Mono',monospace;font-size:10px">${(c.ing/totalIngresos*100).toFixed(0)}%</span></div>`).join('')}
        </div>`:'<div style="padding:2rem;text-align:center;font-size:11px;color:var(--text3)">Sin ventas aún</div>'}
      </div>
    </div>

    <!-- GRÁFICOS FILA 2 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">

      <!-- Top margen horizontal -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow)">
        <div style="font-size:12px;font-weight:600;margin-bottom:10px">🏆 Top productos por margen de ganancia</div>
        ${topMargen.length>0?`
        <div style="overflow-x:auto">
          <svg width="470" height="${topMargen.length*22+10}" style="display:block">${hbars}</svg>
        </div>`:'<div style="padding:1.5rem;text-align:center;font-size:11px;color:var(--text3)">Sin datos de inventario</div>'}
      </div>

      <!-- Stock por categoría -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow)">
        <div style="font-size:12px;font-weight:600;margin-bottom:10px">📦 Stock por categoría</div>
        ${catArr.length>0?`
        <div style="overflow-x:auto">
          <svg width="420" height="${catArr.length*22+10}" style="display:block">${catBars}</svg>
        </div>`:'<div style="padding:1.5rem;text-align:center;font-size:11px;color:var(--text3)">Sin datos de inventario</div>'}
      </div>
    </div>

    <!-- Top capital inmovilizado -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow)">
      <div style="font-size:12px;font-weight:600;margin-bottom:10px">💎 Top 8 por capital inmovilizado en stock</div>
      ${topCapital.length>0?`
      <div style="overflow-x:auto">
        <svg width="${Math.max(topCapital.length*90,400)}" height="130" style="display:block">
          ${topCapital.map((p,i)=>{
            const bh=Math.round(p.valorStock/(topCapital[0].valorStock||1)*80);
            const x=i*90+10;const y=100-bh;
            const shortN=p.nombre.split(' ').slice(0,2).join(' ').substring(0,12);
            return`<rect x="${x}" y="${y}" width="70" height="${bh}" fill="#185FA5" rx="3" opacity="0.75"/>
            <text x="${x+35}" y="${y-4}" text-anchor="middle" font-size="8" fill="#6b6860">Bs.${p.valorStock.toFixed(0)}</text>
            <text x="${x+35}" y="112" text-anchor="middle" font-size="8" fill="#9b9890">${shortN}</text>
            <text x="${x+35}" y="122" text-anchor="middle" font-size="8" fill="#0F6E56">${p.codigo}</text>`;
          }).join('')}
          <line x1="0" y1="100" x2="${topCapital.length*90+20}" y2="100" stroke="#e2e0d8" stroke-width="1"/>
        </svg>
      </div>`:'<div style="padding:1rem;text-align:center;font-size:11px;color:var(--text3)">Sin datos</div>'}
    </div>`;
}


window.expResGenCSV=()=>{
  let csv='Canal,Ingresos,Ganancias estimadas\n';

  Object.values(ventasMenorDB).forEach(v=>{ingMenor+=(v.total||0);(v.items||[]).forEach(i=>{const c=inventarioDB[i.codigo]?.precio_compra||0;ganMenor+=(i.precio-c)*i.qty;});});
  Object.values(ventasMayorDB).forEach(v=>{ingMayor+=(v.total||0);(v.items||[]).forEach(i=>{const c=inventarioDB[i.codigo]?.precio_compra||0;ganMayor+=(i.precio-c)*i.qty;});});
  csv+=`Kits,${ingKits.toFixed(2)},${ganKits.toFixed(2)}\nPor Menor,${ingMenor.toFixed(2)},${ganMenor.toFixed(2)}\nPor Mayor,${ingMayor.toFixed(2)},${ganMayor.toFixed(2)}\nTOTAL,${(ingKits+ingMenor+ingMayor).toFixed(2)},${(ganKits+ganMenor+ganMayor).toFixed(2)}\n`;

};
window.resetVentas=async()=>{

window.autoFillMat=(g)=>{
  const sel=document.getElementById('mit-'+g);if(!sel?.value)return;
  const prod=inventarioDB[sel.value];if(!prod)return;
  // El precio se toma del inventario (precio_kit), no hace falta mostrarlo en el form
};

// Agregar material desde inventario (por código IT seleccionado)
window.addMatFromIT=async(g)=>{
  const itCodigo=document.getElementById('mit-'+g)?.value;
  const qty=parseInt(document.getElementById('mq-'+g)?.value)||1;
  if(!itCodigo){alert('Selecciona un producto del inventario');return;}
  const prod=inventarioDB[itCodigo];
  if(!prod){alert('Producto no encontrado en inventario');return;}
  if(!matsDB[g]) matsDB[g]=[];
  // Usar precio_kit del inventario como precio del kit
  const price=prod.precio_kit||prod.precio_menor||0;
  matsDB[g].push({id:'m'+Date.now(),name:prod.nombre,qty,price,itCodigo});
  lastAdmAction=Date.now();await saveMats();
  document.getElementById('mq-'+g).value='1';
  document.getElementById('mit-'+g).value='';
  renderAdm();
};

function showMsg(id,msg,t){const el=document.getElementById(id);if(!el)return;el.textContent=msg;el.className='adm-msg '+t;setTimeout(()=>el.className='adm-msg',3000);}
function showImpRes(id,msg,t){const el=document.getElementById(id);if(!el)return;el.textContent=msg;el.className='imp-res '+t;setTimeout(()=>el.className='imp-res',5000);}

window.importStus=async()=>{
  const raw=document.getElementById('imp-names')?.value||'';const n=document.getElementById('imp-n')?.value;const c=document.getElementById('imp-c')?.value;
  const names=raw.split('\n').map(x=>x.trim()).filter(x=>x.length>1);if(!names.length){showImpRes('imp-res','Sin nombres','err');return;}
  adminState.impNivel=n;adminState.impCurso=c;const k=ck(n,c);if(!studentsDB[k])studentsDB[k]=[];
  let added=0;names.forEach(name=>{if(!studentsDB[k].includes(name)){studentsDB[k].push(name);added++;}});
  lastAdmAction=Date.now();await saveStus();document.getElementById('imp-names').value='';showAdmResult('✓ '+added+' importados a '+c,'ok');
};
window.clearCurso=async()=>{const n=document.getElementById('imp-n')?.value;const c=document.getElementById('imp-c')?.value;if(!confirm('¿Limpiar '+c+'?'))return;adminState.impNivel=n;adminState.impCurso=c;studentsDB[ck(n,c)]=[];lastAdmAction=Date.now();await saveStus();showAdmResult('Lista de '+c+' limpiada','ok');};
window.importMats=async()=>{
  const raw=document.getElementById('imp-mats')?.value||'';
  const g=document.getElementById('imp-mg')?.value;
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);
  if(!lines.length){showImpRes('imp-mres','Sin datos','err');return;}
  if(!matsDB[g]) matsDB[g]=[];
  let added=0,notFound=[];
  lines.forEach(line=>{
    const parts=line.split('\t');
    const itCodigo=(parts[0]||'').trim().toUpperCase();
    const qty=parseInt(parts[1])||1;
    if(!itCodigo) return;
    const prod=inventarioDB[itCodigo];
    if(!prod){notFound.push(itCodigo);return;}
    const price=prod.precio_kit||prod.precio_menor||0;
    matsDB[g].push({id:'m'+Date.now()+''+Math.floor(Math.random()*1000),name:prod.nombre,qty,price,itCodigo});
    added++;
  });
  lastAdmAction=Date.now();await saveMats();
  document.getElementById('imp-mats').value='';
  const msg=`✓ ${added} importados`+(notFound.length?` · No encontrados: ${notFound.join(', ')}`:'');
  showImpRes('imp-mres',msg,notFound.length?'err':'ok');
  renderAdm();
};


// ── ACTUALIZACIÓN MASIVA DE PRECIOS DE KITS ──
window.actualizarPreciosKits=async()=>{
  if(!confirm('¿Actualizar precios de todos los materiales vinculados al inventario?\n\nSolo se actualizan materiales con código IT asignado.\nLos pagos ya registrados quedan intactos.')) return;
  let totalActualizados=0,totalSinCambio=0,totalSinVinculo=0;
  const cambios=[];
  Object.keys(matsDB).forEach(g=>{
    const mats=matsDB[g]||[];
    mats.forEach(m=>{
      if(!m.itCodigo){totalSinVinculo++;return;}
      const prod=inventarioDB[m.itCodigo];
      if(!prod){totalSinVinculo++;return;}
      const precioNuevo=prod.precio_kit||0;
      if(precioNuevo===m.price){totalSinCambio++;return;}
      cambios.push({nombreMat:m.name,grado:g,viejo:m.price,nuevo:precioNuevo});
      m.price=precioNuevo;
      totalActualizados++;
    });
  });
  if(cambios.length===0){alert('No hay cambios. Todos los materiales vinculados ya tienen el precio correcto.');return;}
  const msgEl=document.getElementById('upd-prices-msg');
  if(msgEl){msgEl.textContent='Guardando...';msgEl.style.color='var(--text3)';}
  try{
    await set(ref(db,'materials'),matsDB);
    const res=cambios.slice(0,8).map(c=>`• ${c.nombreMat} (${c.grado}): Bs.${c.viejo} → Bs.${c.nuevo}`).join('\n');
    const extra=cambios.length>8?`\n...y ${cambios.length-8} más`:'';
    alert(`${totalActualizados} precio${totalActualizados!==1?'s':''} actualizados:\n\n${res}${extra}\n\n${totalSinCambio} sin cambio · ${totalSinVinculo} sin vínculo IT`);
    if(msgEl){msgEl.textContent=`✓ ${totalActualizados} precios actualizados`;msgEl.style.color='var(--green)';}
    renderAdm();
  }catch(e){
    if(msgEl){msgEl.textContent='Error al guardar';msgEl.style.color='var(--red)';}
    console.error('actualizarPreciosKits:',e);
  }
};

window.addMat=async g=>{
  const name=document.getElementById('mn-'+g)?.value.trim();
  const qty=parseInt(document.getElementById('mq-'+g)?.value)||1;
  const price=parseFloat(document.getElementById('mp-'+g)?.value)||0;
  if(!name)return;
  if(!matsDB[g]) matsDB[g]=[];
  matsDB[g].push({id:'m'+Date.now(),name,qty,price,itCodigo:''});
  lastAdmAction=Date.now();await saveMats();
  document.getElementById('mn-'+g).value='';
  document.getElementById('mp-'+g).value='';
  document.getElementById('mq-'+g).value='1';
  renderAdm();
};
window.delMat=async(g,i)=>{if(!confirm('¿Eliminar "'+matsDB[g][i]?.name+'"?'))return;matsDB[g].splice(i,1);await saveMats();renderAdm();};
window.clearMats=async()=>{const g=document.getElementById('imp-mg')?.value;if(!confirm('¿Eliminar materiales de '+g+'?'))return;matsDB[g]=[];await saveMats();showImpRes('imp-mres','Materiales eliminados','ok');renderAdm();};
window.autoLinkAllMats=async()=>{
  let linked=0,total=0;
  Object.keys(matsDB).forEach(g=>{
    (matsDB[g]||[]).forEach(m=>{
      total++;
      if(!m.itCodigo){
        // buscar en inventario por nombre similar
        const n=m.name.trim().toUpperCase();
        const found=Object.values(inventarioDB).find(p=>p.nombre.toUpperCase()===n||p.nombre.toUpperCase().includes(n)||n.includes(p.nombre.toUpperCase()));
        if(found){m.itCodigo=found.codigo;linked++;}
      }
    });
  });
  if(linked===0){showMsg('kp-msg','Sin nuevos vínculos ('+total+' revisados)','err');return;}
  lastAdmAction=Date.now();await saveMats();
  showMsg('kp-msg','✓ '+linked+' materiales vinculados','ok');
  renderAdm();
};
window.savePasses=async()=>{const pt=document.getElementById('npt')?.value.trim();const pa=document.getElementById('npa')?.value.trim();if(!pt&&!pa){showMsg('pass-msg','Escribe al menos una','err');return;}if(pt){PASS_T=pt;cfg.passTeacher=pt;}if(pa){PASS_A=pa;cfg.passAdmin=pa;}await saveCfg();document.getElementById('npt').value='';document.getElementById('npa').value='';showMsg('pass-msg','Guardadas','ok');};

// ── FIREBASE ──
try{
  const fbApp=initializeApp(FB);
  db=getDatabase(fbApp);
  try{getStorage(fbApp);}catch(e){console.warn('Storage not available');}

  let loaded={cfg:false,stu:false,cob:false,mat:false,kp:false,inv:false,vm:false,vmy:false};
  let appStarted=false;
  function tryShow(){
    if(appStarted)return;
    if(!Object.values(loaded).every(Boolean))return;
    appStarted=true;
    document.getElementById('loading').style.opacity='0';
    setTimeout(()=>{
      document.getElementById('loading').style.display='none';
      const savedRole=loadSession();
      if(savedRole==='admin'||savedRole==='teacher') showApp(savedRole);
      else showLogin();
    },400);
    setSS('saved');
  }

  onValue(ref(db,'config'),s=>{
    cfg=s.val()||{};
    if(cfg.passTeacher) PASS_T=cfg.passTeacher;
    if(cfg.passAdmin) PASS_A=cfg.passAdmin;
    if(cfg.schoolName) schoolName=cfg.schoolName;
    if(cfg.schoolLogo) schoolLogo=cfg.schoolLogo;
    if(cfg.schoolQR) schoolQR=cfg.schoolQR;
    if(cfg.ticketQR) ticketQR=cfg.ticketQR;
    if(cfg.ticketCfg) ticketCfg={...ticketCfg,...cfg.ticketCfg};
    if(!cfg.passTeacher){cfg.passTeacher=PASS_T;cfg.passAdmin=PASS_A;saveCfg();}
    loaded.cfg=true;tryShow();if(role)updateBranding();
  });
  onValue(ref(db,'students'),s=>{
    studentsDB=s.val()||{};loaded.stu=true;tryShow();
    if(role&&tab==='student') renderStu();
    if(role&&tab==='summary') renderSum();
    if(role&&tab==='admin'&&Date.now()-lastAdmAction>1500) renderAdm();
  });
  onValue(ref(db,'cobros'),s=>{
    const freshData=s.val()||{};
    const now2=Date.now();
    // Bloquear si hay un save en curso o si se guardó recientemente
    const hasPendingSave=isSaving||(now2-lastPayTime<6000)||(now2-lastToggleTime<6000)||(now2-lastAdmAction<4000);
    if(hasPendingSave){
      // Solo actualizar cursos que no estamos editando
      const currentKey=ck(nivel,curso);
      Object.keys(freshData).forEach(k=>{
        if(k!==currentKey){
          // Sanitizar component keys al hacer merge
          const courseData=freshData[k];
          if(courseData){
            Object.keys(courseData).forEach(stuKey=>{
              const stu=courseData[stuKey];
              if(stu&&stu.components){
                const cleanComps={};
                Object.keys(stu.components).forEach(cid=>{
                  cleanComps[cid.replace(/\./g,'_')]=stu.components[cid];
                });
                stu.components=cleanComps;
              }
            });
          }
          cobrosDB[k]=courseData;
        }
      });
    } else {
      // Sanitizar component keys al cargar (pueden tener '.' de versiones anteriores)
      Object.keys(freshData).forEach(courseKey=>{
        const course=freshData[courseKey];
        if(!course) return;
        Object.keys(course).forEach(stuKey=>{
          const stu=course[stuKey];
          if(stu&&stu.components){
            const cleanComps={};
            Object.keys(stu.components).forEach(cid=>{
              cleanComps[cid.replace(/\./g,'_')]=stu.components[cid];
            });
            stu.components=cleanComps;
          }
        });
      });
      cobrosDB=freshData;
    }
    loaded.cob=true; tryShow();
    if(hasPendingSave) return;
    if(role&&tab==='student') renderStu();
    if(role&&tab==='summary') renderSum();
    if(role&&tab==='history') renderHist();
    if(role&&tab==='obs') renderObs();
  });
  onValue(ref(db,'materials'),s=>{
    const rawMats=s.val()||{};
    // Sanitizar IDs de materiales: reemplazar '.' por '_' en todas las IDs
    Object.keys(rawMats).forEach(g=>{
      if(Array.isArray(rawMats[g])){
        rawMats[g]=rawMats[g].map(m=>({...m,id:String(m.id).replace(/\./g,'_')}));
      } else if(rawMats[g]&&typeof rawMats[g]==='object'){
        rawMats[g]=Object.values(rawMats[g]).map(m=>({...m,id:String(m.id).replace(/\./g,'_')}));
      }
    });
    matsDB=rawMats;loaded.mat=true;tryShow();
    const now3=Date.now();if(now3-lastAdmAction<1500)return;
    if(role&&tab==='student') renderStu();
    if(role&&tab==='admin') renderAdm();
  });
  onValue(ref(db,'kitPrices'),s=>{
    kitPDB=s.val()||{};loaded.kp=true;tryShow();
    if(role&&tab==='admin'&&Date.now()-lastAdmAction<1500)return;
    if(role&&tab==='admin') renderAdm();
  });
  onValue(ref(db,'inventario'),s=>{
    inventarioDB=s.val()||{};loaded.inv=true;tryShow();
    if(Date.now()-lastInvAction<2000)return;
    if(role==='admin'&&seccion==='inventario') renderInv();
    if(role==='admin'&&seccion==='resgen') renderResGen();
  });
  onValue(ref(db,'ventas_menor'),s=>{
    ventasMenorDB=s.val()||{};loaded.vm=true;tryShow();
    if(role==='admin'&&seccion==='menor') renderTienda('menor');
    if(role==='admin'&&seccion==='resgen') renderResGen();
  });
  onValue(ref(db,'ventas_mayor'),s=>{
    ventasMayorDB=s.val()||{};loaded.vmy=true;tryShow();
    if(role==='admin'&&seccion==='mayor') renderTienda('mayor');
    if(role==='admin'&&seccion==='resgen') renderResGen();
  });

  window.addEventListener('online',()=>document.getElementById('conn-bar').classList.remove('offline'));
  window.addEventListener('offline',()=>document.getElementById('conn-bar').classList.add('offline'));
}catch(e){
  document.getElementById('loading').style.display='none';showLogin();
}
</script>
